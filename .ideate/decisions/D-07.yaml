description: "`cb_read` gains: pipe `|` delimited multi-identifier support (up to 10 identifiers), `synthesize: bool` parameter, and `max_chars_per_note: int` (default 2000, 0 = no truncation). Empty-query synthesis uses a fallback message. Pipe `|` is the delimiter because it does not appear in Obsidian filenames."
rationale: Design approved in WI-041. `max_chars_per_note` was changed from hardcoded to an explicit parameter at user request. Net tool count remains 11.
