description: shared.py changed from importing via the extract_beats.py re-export hub to importing directly from source modules (e.g., `from cyberbrain.extractors.vault import ...`). This removed the prerequisite for conftest.py sys.modules mock injection in tests.
rationale: The re-export hub added an indirection layer that forced tests to mock the hub rather than the real modules. Direct imports are more transparent and correct.
