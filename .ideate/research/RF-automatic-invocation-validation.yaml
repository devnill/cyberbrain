  _List features that failed or behaved unexpectedly, with root cause if known._
  
  ### Client capability matrix
  
  | Capability | Claude Desktop | Claude Code |
  |---|---|---|
  | Auto-fetch resources | | |
  | Manual resource read | | |
  | Prompt picker | | |
  | Proactive tool calls (from guide) | | |
  | Proactive tool calls (from CLAUDE.md) | N/A | |
  | Tool discovery from descriptions | | |
  
  ### Recommendations
  
  _Based on findings, what changes should be made?_
  
  - Should `cb_setup` generate CLAUDE.md instructions for Claude Code to replicate guide behavior?
  - Is the guide resource worth maintaining if Desktop does not auto-fetch?
  - Should orient become a tool instead of a prompt for broader client support?
  - Are there MCP protocol changes on the roadmap that would improve automatic invocation?
