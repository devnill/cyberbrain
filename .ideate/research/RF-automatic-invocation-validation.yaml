content: |
  # Automatic Invocation Validation — Manual Test Plan
  
  ## Purpose
  
  This test plan validates cyberbrain's automatic invocation features: proactive recall, the `cyberbrain://guide` resource, and the `orient`/`recall` prompts. These features govern whether cyberbrain tools activate without explicit user requests, and their behavior differs significantly between Claude Desktop and Claude Code. The goal is to document what actually works in each client so we can make informed decisions about where to invest.
  
  ## Features Under Test
  
  | Feature | Implementation | Expected Trigger |
  |---|---|---|
  | Proactive recall | `proactive_recall` config flag; wording in `cyberbrain://guide` resource | Model calls `cb_recall` without being asked |
  | `cyberbrain://guide` resource | `mcp/resources.py` — registered as `cyberbrain://guide` | Client auto-fetches or model reads at session start |
  | `orient` prompt | `mcp/resources.py` — MCP prompt, injects guide + calls `cb_status` | User selects from prompt picker (Claude Desktop) |
  | `recall` prompt | `mcp/resources.py` — MCP prompt, scans conversation for topics | User selects from prompt picker (Claude Desktop) |
  | `desktop_capture_mode` | Config flag (`suggest`/`auto`/`manual`); changes `cb_file` wording in guide | Model follows filing behavior described in guide |
  
  ---
  
  ## Prerequisites
  
  ### Environment
  
  - Claude Desktop (macOS) — note version used in execution metadata
  - Claude Code CLI — note version used in execution metadata
  - Cyberbrain MCP server running and registered in both clients
  - Obsidian vault configured with at least 10 notes indexed (so recall has content to find)
  
  ### Configuration Baseline
  
  Start each test group from this baseline unless the test specifies otherwise:
  
  ```json
  {
    "vault_path": "<configured vault>",
    "inbox": "<configured inbox>",
    "backend": "claude-code",
    "proactive_recall": true,
    "desktop_capture_mode": "suggest",
    "autofile": false
  }
  ```
  
  ### Verification Before Testing
  
  1. Run `cb_status` from both clients — confirm vault is connected and index is populated
  2. Confirm MCP server logs are accessible (check stderr or log file for tool call traces)
  3. Have a topic present in the vault that you can reference naturally in conversation (e.g., a project name that has several notes)
  
  ---
  
  ## Test Cases
  
  ### Group A — Proactive Recall
  
  #### A1: Proactive recall triggers on topic mention (Claude Desktop)
  
  | Field | Value |
  |---|---|
  | **ID** | A1 |
  | **Description** | With `proactive_recall: true`, mention a known vault topic in Claude Desktop. Check whether the model calls `cb_recall` without being asked. |
  | **Preconditions** | `proactive_recall: true`; `cyberbrain://guide` loaded (via orient prompt or auto-fetch); vault has notes on the topic |
  | **Steps** | 1. Start new Claude Desktop conversation. 2. Select the `orient` prompt from the prompt picker. 3. After orientation completes, say "I'm working on [known-topic] today." 4. Observe whether `cb_recall` is called. |
  | **Expected** | Model calls `cb_recall` proactively and integrates results into response. |
  | **Actual** | |
  | **Result** | |
  
  #### A2: Proactive recall triggers on topic mention (Claude Code)
  
  | Field | Value |
  |---|---|
  | **ID** | A2 |
  | **Description** | With `proactive_recall: true`, mention a known vault topic in Claude Code. Check whether the model calls `cb_recall` without being asked. |
  | **Preconditions** | `proactive_recall: true`; no CLAUDE.md instruction to load guide (baseline); vault has notes on the topic |
  | **Steps** | 1. Start new Claude Code session. 2. Say "I'm working on [known-topic] today." 3. Observe whether `cb_recall` is called. |
  | **Expected** | Unclear — Claude Code has no mechanism to auto-load the guide resource, so the model may not know `cb_recall` exists unless it sees the tool list. Document what happens. |
  | **Actual** | |
  | **Result** | |
  
  #### A3: Proactive recall disabled (Claude Desktop)
  
  | Field | Value |
  |---|---|
  | **ID** | A3 |
  | **Description** | With `proactive_recall: false`, mention a known vault topic. Check whether the model asks permission before calling `cb_recall`. |
  | **Preconditions** | `proactive_recall: false`; `cyberbrain://guide` loaded via orient prompt |
  | **Steps** | 1. Set `proactive_recall: false` via `cb_configure`. 2. Start new conversation, select orient prompt. 3. Mention a known topic. 4. Observe whether model asks permission or calls directly. |
  | **Expected** | Model suggests calling `cb_recall` and waits for confirmation. |
  | **Actual** | |
  | **Result** | |
  
  #### A4: Proactive recall at session start (Claude Code, with CLAUDE.md hint)
  
  | Field | Value |
  |---|---|
  | **ID** | A4 |
  | **Description** | Add a CLAUDE.md instruction telling Claude Code to call `cb_recall` at session start. Check whether this works as a substitute for the guide resource. |
  | **Preconditions** | `proactive_recall: true`; project CLAUDE.md includes instruction like "At the start of each session, call cb_recall with the project name." |
  | **Steps** | 1. Add instruction to project CLAUDE.md. 2. Start new Claude Code session in that project. 3. Observe first tool call. |
  | **Expected** | Model calls `cb_recall` early in the session based on CLAUDE.md instruction. |
  | **Actual** | |
  | **Result** | |
  
  #### A5: Mid-session topic shift triggers recall (Claude Desktop)
  
  | Field | Value |
  |---|---|
  | **ID** | A5 |
  | **Description** | After several exchanges on topic A, shift to topic B (also in vault). Check whether model proactively recalls topic B. |
  | **Preconditions** | `proactive_recall: true`; guide loaded; vault has notes on both topics |
  | **Steps** | 1. Converse about topic A for 3-4 exchanges. 2. Say "Actually, let's switch to [topic B]." 3. Observe whether `cb_recall` fires for topic B. |
  | **Expected** | Model calls `cb_recall` for topic B without being asked. |
  | **Actual** | |
  | **Result** | |
  
  ---
  
  ### Group B — Resource Loading
  
  #### B1: Guide resource auto-fetch (Claude Desktop)
  
  | Field | Value |
  |---|---|
  | **ID** | B1 |
  | **Description** | Check whether Claude Desktop automatically fetches `cyberbrain://guide` when the MCP server advertises it. |
  | **Preconditions** | MCP server running with resource registered; no orient prompt selected |
  | **Steps** | 1. Start new Claude Desktop conversation without selecting any prompt. 2. Check MCP server logs for a resource fetch of `cyberbrain://guide`. 3. Ask "What cyberbrain tools do you have?" and observe whether the response reflects guide content or just raw tool descriptions. |
  | **Expected** | Document whether auto-fetch occurs. If it does, model should know behavioral guidance (when to call each tool). If not, model only sees tool names and descriptions. |
  | **Actual** | |
  | **Result** | |
  
  #### B2: Guide resource manual fetch (Claude Desktop)
  
  | Field | Value |
  |---|---|
  | **ID** | B2 |
  | **Description** | Ask the model to read the cyberbrain guide resource explicitly. |
  | **Preconditions** | MCP server running |
  | **Steps** | 1. Start new conversation. 2. Say "Read the cyberbrain://guide resource." 3. Observe whether the model can fetch and display the guide content. |
  | **Expected** | Document whether Claude Desktop supports explicit resource reads from user request. |
  | **Actual** | |
  | **Result** | |
  
  #### B3: Guide resource availability (Claude Code)
  
  | Field | Value |
  |---|---|
  | **ID** | B3 |
  | **Description** | Check whether Claude Code can access the `cyberbrain://guide` resource at all. |
  | **Preconditions** | MCP server running in Claude Code |
  | **Steps** | 1. Start new Claude Code session. 2. Say "Read the cyberbrain://guide resource." 3. Observe response. |
  | **Expected** | Claude Code may not support MCP resources natively. Document behavior. |
  | **Actual** | |
  | **Result** | |
  
  #### B4: Guide content reflects config changes
  
  | Field | Value |
  |---|---|
  | **ID** | B4 |
  | **Description** | Change `proactive_recall` and `desktop_capture_mode`, then re-fetch guide. Verify content changes. |
  | **Preconditions** | Ability to fetch guide (use whichever client worked in B1/B2) |
  | **Steps** | 1. Fetch guide with `proactive_recall: true`, `desktop_capture_mode: suggest`. Note recall and filing wording. 2. Change to `proactive_recall: false`, `desktop_capture_mode: auto`. 3. Fetch guide again. 4. Compare wording. |
  | **Expected** | Recall section changes from "call proactively" to "suggest and confirm." Filing section changes from "offer first" to "call immediately." |
  | **Actual** | |
  | **Result** | |
  
  ---
  
  ### Group C — Prompt Invocation
  
  #### C1: Orient prompt appears in picker (Claude Desktop)
  
  | Field | Value |
  |---|---|
  | **ID** | C1 |
  | **Description** | Verify the `orient` prompt appears in Claude Desktop's prompt picker UI. |
  | **Preconditions** | MCP server running |
  | **Steps** | 1. Open Claude Desktop. 2. Look for prompt picker UI element (typically a slash or dropdown). 3. Check whether "orient" appears as an option. |
  | **Expected** | Orient prompt visible and selectable. |
  | **Actual** | |
  | **Result** | |
  
  #### C2: Orient prompt executes correctly (Claude Desktop)
  
  | Field | Value |
  |---|---|
  | **ID** | C2 |
  | **Description** | Select orient prompt and verify it injects the guide and triggers `cb_status`. |
  | **Preconditions** | MCP server running; orient prompt visible |
  | **Steps** | 1. Start new conversation. 2. Select orient prompt. 3. Observe injected message content. 4. Check whether model calls `cb_status`. |
  | **Expected** | Message injected with guide text; model calls `cb_status` and reports vault health. |
  | **Actual** | |
  | **Result** | |
  
  #### C3: Recall prompt appears in picker (Claude Desktop)
  
  | Field | Value |
  |---|---|
  | **ID** | C3 |
  | **Description** | Verify the `recall` prompt appears in Claude Desktop's prompt picker UI. |
  | **Preconditions** | MCP server running |
  | **Steps** | 1. Open Claude Desktop. 2. Check prompt picker for "recall" option. |
  | **Expected** | Recall prompt visible and selectable. |
  | **Actual** | |
  | **Result** | |
  
  #### C4: Recall prompt scans and queries (Claude Desktop)
  
  | Field | Value |
  |---|---|
  | **ID** | C4 |
  | **Description** | After discussing several topics, select the recall prompt. Verify model scans conversation and calls `cb_recall` for relevant topics. |
  | **Preconditions** | MCP server running; vault has notes on at least one discussed topic |
  | **Steps** | 1. Have a conversation mentioning 2-3 topics. 2. Select the recall prompt. 3. Observe how many `cb_recall` calls are made. 4. Check whether results are summarized. |
  | **Expected** | Model identifies topics from conversation, calls `cb_recall` for each, summarizes findings. |
  | **Actual** | |
  | **Result** | |
  
  #### C5: Prompts in Claude Code
  
  | Field | Value |
  |---|---|
  | **ID** | C5 |
  | **Description** | Check whether MCP prompts are accessible in Claude Code at all. |
  | **Preconditions** | MCP server running in Claude Code |
  | **Steps** | 1. Start Claude Code session. 2. Try to invoke the orient prompt (try "use the orient prompt", "/orient", etc.). 3. Document what happens. |
  | **Expected** | Claude Code likely does not support MCP prompts natively. Document behavior. |
  | **Actual** | |
  | **Result** | |
  
  ---
  
  ### Group D — Cross-Client Behavior Differences
  
  #### D1: Tool discovery without guide (both clients)
  
  | Field | Value |
  |---|---|
  | **ID** | D1 |
  | **Description** | Without loading the guide, check whether each client's model can discover and correctly use cyberbrain tools from tool descriptions alone. |
  | **Preconditions** | Fresh session in each client; no orient prompt, no guide loaded |
  | **Steps** | 1. In each client, say "Search my notes for [topic]." 2. Observe whether model finds and calls `cb_recall`. 3. Say "Save this insight: [something]." 4. Observe whether model finds and calls `cb_file`. |
  | **Expected** | Both clients should discover tools from descriptions. The guide adds behavioral nuance (proactive vs. reactive) but basic tool selection should work without it. |
  | **Actual (Desktop)** | |
  | **Actual (Code)** | |
  | **Result** | |
  
  #### D2: Capture mode behavior (Claude Desktop)
  
  | Field | Value |
  |---|---|
  | **ID** | D2 |
  | **Description** | Test all three `desktop_capture_mode` settings in Claude Desktop. |
  | **Preconditions** | Guide loaded via orient prompt |
  | **Steps** | For each mode (`suggest`, `auto`, `manual`): 1. Set mode via `cb_configure`. 2. Start new conversation with orient prompt. 3. Generate something worth filing (e.g., make a non-obvious decision). 4. Observe model behavior. |
  | **Expected suggest** | Model offers to file and waits for confirmation. |
  | **Expected auto** | Model files immediately and reports what was saved. |
  | **Expected manual** | Model does not offer to file anything. |
  | **Actual suggest** | |
  | **Actual auto** | |
  | **Actual manual** | |
  | **Result** | |
  
  #### D3: Claude Code with CLAUDE.md-driven invocation
  
  | Field | Value |
  |---|---|
  | **ID** | D3 |
  | **Description** | Test whether a project CLAUDE.md can effectively replicate guide behavior in Claude Code. |
  | **Preconditions** | Project CLAUDE.md with cyberbrain usage instructions (recall on topic mention, file on decision) |
  | **Steps** | 1. Add cyberbrain instructions to project CLAUDE.md. 2. Start Claude Code session. 3. Mention a vault topic. 4. Make a decision worth filing. 5. Observe tool calls. |
  | **Expected** | CLAUDE.md instructions drive tool usage similarly to the guide resource in Desktop. |
  | **Actual** | |
  | **Result** | |
  
