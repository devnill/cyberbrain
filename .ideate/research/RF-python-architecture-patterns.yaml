  # Python Architecture Patterns Research
  
  **Scope:** Architecture patterns for mid-size CLI/server Python applications, focused on five specific questions raised during planning for the cyberbrain project. Findings are based on current codebase inspection combined with web research (as of March 2026).
  
  ---
  
  ## Summary
  
  This report covers five architectural questions: large-module decomposition, two-level JSON configuration management, state-directory abstraction for scattered files, re-export hub modules, and subprocess management for spawning CLI tools. All five have established Python patterns with concrete tradeoffs. The cyberbrain codebase already uses some patterns correctly (subprocess isolation with `start_new_session`, flat dict config with two-level merge) and has known gaps (9+ hardcoded state paths scattered across 6+ modules with no central registry, no type-annotated config object).
  
  ---
  
  ## Question 1: Breaking Up a 2000+ Line Module
  
  ### Context
  
  `restructure.py` is 2,387 lines with 65+ functions at module scope. It contains: note collection, JSON caching (groups cache), LLM prompt calls (audit, decide, generate), embedding clustering, tag-based clustering, dry-run formatting, preview formatting, execution logic, and the `register()` entrypoint. These are not just long functions — they are semantically distinct phases.
  
  ### Key Facts
  
  - The module has a clear 5-phase execution pipeline: **collect → cluster/audit → decide → generate → execute**. Each phase maps to a distinct set of functions.
  - Three clustering strategies (embedding, LLM, tag-based) share the same signature interface and call site, making them extractable as a strategy pattern without interface changes.
  - The `register()` function at line 1761 is the only public interface. All 65+ other functions are private (`_` prefixed). This means decomposition can happen entirely internally — no external caller changes required.
  - Python's module system supports package-internal decomposition without exposing the split to callers: a `restructure/` package with `__init__.py` that re-exports only `register` is indistinguishable from the current single file.
  - The "horizontal layer" decomposition (split by: caching, clustering, formatting, execution) risks creating files that are hard to navigate because a single feature touches all layers.
  - The "vertical slice" decomposition for this code is by **phase**, not by feature, because all phases serve one tool (`cb_restructure`) — there is no independent feature to isolate.
  
  ### Decomposition Strategy Options
  
  **Option A: Phase-based sub-package**
  Convert `mcp/tools/restructure.py` to `mcp/tools/restructure/` package with files:
  - `__init__.py` — re-exports `register` only
  - `collect.py` — `_collect_notes`, `_collect_notes_for_hub`, `_is_locked`
  - `cluster.py` — embedding, LLM, tag-based clustering, dispatch
  - `cache.py` — groups cache save/load/clear
  - `audit.py` — `_call_audit_notes`, `_call_audit_notes_batch`, gate logic
  - `decide.py` — `_call_decisions`, `_gate_decisions`
  - `generate.py` — `_call_generate_cluster`, `_call_generate_split`, `_generate_all_parallel`
  - `execute.py` — `_execute_cluster_decisions`
  - `format.py` — all `_format_*` and `_build_*` output formatters
  - `pipeline.py` — `register()` and the main orchestration body
  
  **Pros:** Each file is under 300 lines, phases are testable in isolation, function names remain unchanged (no caller impact).
  
  **Cons:** Cross-phase imports increase; 9 files instead of 1 raises navigation overhead for small changes. Circular imports are possible if `pipeline.py` and sub-modules mutually reference — requires disciplined one-directional dependency (pipeline imports all others, others do not import pipeline).
  
  **When to use:** When the primary pain is "I cannot find X in 2400 lines." The phase names become file names — grep target is replaced by file name.
  
  **Option B: Extract clustering as a standalone module**
  Move all clustering logic (embedding, LLM, tag, dispatch, cache) to `extractors/clustering.py`. This is a horizontal slice but justified because clustering is already used only via `_dispatch_grouping` and could be reused by other tools (e.g. `enrich.py`).
  
  **Pros:** Clustering is the densest part (~400 lines) and the most independently testable. Low refactor risk — only `restructure.py` calls these functions.
  
  **Cons:** Does not significantly reduce `restructure.py`'s line count on its own. Likely a prerequisite step, not a complete solution.
  
  **When to use:** As a first step before Option A, or if clustering reuse becomes real.
  
  **Option C: Do nothing / doc-comment sectioning**
  Add `# ---- PHASE: COLLECT ----` separators and document function groupings in the module docstring. Zero risk, zero refactor cost.
  
  **Pros:** Zero migration risk. Works immediately. Editors use these as fold points.
  
  **Cons:** Does not reduce cognitive load when the file loads 2400 lines.
  
  **When to use:** As a temporary measure before a planned refactor, or if there is no current test coverage to validate correctness post-split.
  
  ### Preserving the Interface
  
  The `register(mcp: FastMCP)` function is the only external interface. Converting the file to a package with `__init__.py` exporting only `register` means zero changes to `server.py` or any other caller.
  
  ---
  
  ## Question 2: Two-Level Configuration (Global + Per-Project Override)
  
  ### Context
  
  Current implementation: `config.py` loads JSON with `json.load()`, returns plain `dict`, merges via `{**global_cfg, **project_cfg}`. Config is passed as `dict` to every function. Type errors are silent (missing keys return `None` or crash at use site, not at load time).
  
  ### Key Facts
  
  - **pydantic-settings** (`pydantic-settings` package, separate from `pydantic` core): Loads from environment variables, `.env` files, JSON files (v2.x), secrets files. Validates and coerces on load. Requires adding `pydantic-settings` as a dependency. As of pydantic-settings 2.x, JSON file sources are supported natively. The nested config problem (env var for nested dict) is known awkward.
  - **dynaconf**: Supports JSON, TOML, YAML, INI, Python files and layered merging by environment name. `DYNACONF_FOO` env vars override any source. Adds a heavier dependency (~150KB installed). Overkill for a two-source system with no environment switching (dev/prod/staging).
  - **plain `dataclass` with `__post_init__` validation**: No new dependencies. Type annotations make the shape explicit. Requires writing `@dataclass class Config:` with default values matching current defaults. Migration from dict: wrap `dict` at load time via `Config(**json_data)`. Allows `config.vault_path` instead of `config.get("vault_path")`. Does not validate types unless `__post_init__` does it explicitly.
  - **`TypedDict`**: Annotates existing dict usage without changing call sites. `config: CyberbrainConfig` is valid on existing dicts. Provides IDE type checking, zero runtime overhead, zero migration cost at call sites. Does not enforce types at runtime.
  - **Current dict approach**: Works. The two-level merge is three lines. Switching to a typed object is a quality-of-life improvement, not a correctness requirement — unless silent key misses are causing bugs.
  
  ### Migration Path from Dict
  
  The least-disruptive path to typed config without changing call sites:
  1. Define `TypedDict CyberbrainConfig` matching current known keys with appropriate types.
  2. Annotate `load_global_config() -> CyberbrainConfig`, `resolve_config() -> CyberbrainConfig`.
  3. All existing `config.get("key")` calls still work (TypedDict is a dict subclass annotation, not enforced at runtime).
  4. If stricter validation is later needed, migrate to `dataclass` at load time and change `config.get("key")` to `config.key` progressively.
  
  ### Key Tradeoffs
  
  | Approach | Runtime validation | Dependency | Dict-compatible call sites | Migration cost |
  |---|---|---|---|---|
  | Plain dict (current) | None | None | Yes | None |
  | TypedDict annotation | None (type check only) | None | Yes | Minimal |
  | dataclass | Optional via `__post_init__` | None | No (dot access) | Moderate |
  | pydantic-settings | On load | pydantic-settings | No (dot access) | Moderate |
  | dynaconf | On access | dynaconf | No (dot access) | High |
  
  **pydantic-settings recommendation:** Only justifiable if the project already uses pydantic heavily (it does use `pydantic.Field` in MCP tool signatures). The `BaseSettings` approach would add load-time validation but requires converting all `config.get("key")` call sites to `config.key`. That is a non-trivial diff across all 7+ tool files and both extractor modules.
  
  **dynaconf:** Not justified for a two-source, single-environment config with no `.env` file support requirement. Adds complexity without benefit.
  
  ---
  
  ## Question 3: State Directory Abstraction
  
  ### Context
  
  Current state: 9+ hardcoded `Path.home() / ".claude" / "cyberbrain" / ...` paths scattered across 6 modules with no central registry:
  
  | File | What it references |
  |---|---|
  | `run_log.py` | `logs/cb-extract.log`, `logs/cb-runs.jsonl` |
  | `config.py` | `config.json` |
  | `search_backends.py` | `search-index.db`, `search-index.usearch`, `search-index-manifest.json` |
  | `search_index.py` | `.index-scan-ts`, `config.json` |
  | `recall.py` | `search-index.db`, `search-index-manifest.json`, `wm-recall.jsonl` |
  | `restructure.py` | `.restructure-groups-cache.json`, `search-index-manifest.json` |
  | `backends.py` | (used as subprocess cwd) |
  | `evaluate.py` | `evaluations/` |
  | `manage.py` | `config.json` |
  
  This means the base path `~/.claude/cyberbrain` appears 14+ times in source. If the path changes (e.g. to support XDG dirs on Linux, or a custom install location), every reference must be updated.
  
  ### Key Facts
  
  - **platformdirs** (`tox-dev/platformdirs`, actively maintained successor to deprecated `appdirs`): Returns `~/.local/share/AppName` on Linux (XDG), `~/Library/Application Support/AppName` on macOS, and `%APPDATA%/AppName` on Windows. Returns `pathlib.Path` objects directly. For cyberbrain's current macOS-only install, this would differ from the current `~/.claude/cyberbrain/` path and require a migration.
  - **XDG base directory**: Linux standard. macOS and Windows have equivalents via platformdirs but not XDG env vars natively.
  - **State directory pattern**: Centralise all path definitions in one module (`state.py` or `paths.py`). All other modules import from it. The base directory becomes a single constant or function call. This is not a library pattern — it is a code organization pattern. Zero new dependencies required.
  - The cyberbrain project currently pins to `~/.claude/cyberbrain/` because it is co-located with Claude Code's config. This is by design (not a missing feature). The abstraction value is purely for maintainability: one place to change the base path rather than 14.
  
  ### The Pattern
  
  A minimal `state.py` module:
  
  ```python
  # src/cyberbrain/state.py
  from pathlib import Path
  
  _BASE = Path.home() / ".claude" / "cyberbrain"
  
  CONFIG_PATH = _BASE / "config.json"
  EXTRACT_LOG_PATH = _BASE / "logs" / "cb-extract.log"
  RUNS_LOG_PATH = _BASE / "logs" / "cb-runs.jsonl"
  SEARCH_DB_PATH = _BASE / "search-index.db"
  SEARCH_MANIFEST_PATH = _BASE / "search-index-manifest.json"
  SEARCH_USEARCH_PATH = _BASE / "search-index.usearch"
  INDEX_SCAN_MARKER_PATH = _BASE / ".index-scan-ts"
  GROUPS_CACHE_PATH = _BASE / ".restructure-groups-cache.json"
  WM_RECALL_LOG_PATH = _BASE / "wm-recall.jsonl"
  EVALUATIONS_DIR = _BASE / "evaluations"
  SUBPROCESS_CWD = str(_BASE)
  ```
  
  All modules import from here. The base path is changed in one place.
  
  **Pros:** Single source of truth, eliminates scattered hardcoding, trivially testable (mock `_BASE`).
  
  **Cons:** One more import chain. Circular import risk if `state.py` imports from other modules — keep it free of cross-module imports.
  
  **platformdirs alternative**: Would diverge from current install path. Not justified without a cross-platform distribution requirement. The current `~/.claude/cyberbrain/` path is not arbitrary — it is deliberate co-location.
  
  ---
  
  ## Question 4: Re-export Hub Module
  
  ### Context
  
  `extract_beats.py` re-exports from 7 modules (`config`, `backends`, `transcript`, `run_log`, `vault`, `extractor`, `autofile`, `frontmatter`) for backward compatibility. `shared.py` imports from `extract_beats` as the hub.
  
  ### Key Facts
  
  - The re-export hub pattern is standard Python for library public API definition. The scientific Python community and major packages (numpy, pandas, sklearn) all use `__init__.py` re-exports to define public API while splitting implementation into submodules.
  - **When it becomes an anti-pattern:** When the hub is a non-`__init__.py` application module (a named `.py` file) that is not the package's public API but is used as one. The issue is that callers import `from extract_beats import X` — but `extract_beats.py` is a script with a `main()` function, not a library module. The dual role (CLI entrypoint + import hub) is the actual problem.
  - **mypy and strict type checkers**: Under `--no-implicit-reexport` (the strict default in mypy), re-exports via `from module import X` are not considered public. The explicit form is `from module import X as X` (tautological `as` alias). Without this, mypy will flag callers.
  - The `__all__` list is the canonical way to declare a module's public API. Its absence from `extract_beats.py` means the re-export surface is implicit.
  - `shared.py` imports 8 names from `extract_beats`. If `extract_beats.py` is ever changed (e.g. split further), `shared.py` must be updated. The coupling is load-bearing.
  
  ### Options
  
  **Option A: Leave as-is**
  - Pros: No migration risk. Works.
  - Cons: `extract_beats.py`'s dual role as CLI script and import hub is confusing. Future contributors will be confused about whether to import from `extract_beats` or from the actual submodules.
  - When to use: If backward compatibility with tests and external callers is the primary constraint.
  
  **Option B: Move hub to `__init__.py`**
  Convert `cyberbrain/extractors/__init__.py` to the hub. Currently it is empty. Move all re-exports there. `extract_beats.py` becomes a pure CLI script that imports from `cyberbrain.extractors`.
  - Pros: `__init__.py` as API hub is idiomatic. Separates script entry point from import surface.
  - Cons: Changes all `from cyberbrain.extractors.extract_beats import X` to `from cyberbrain.extractors import X` — requires updating `shared.py` and tests.
  - When to use: If refactoring `extract_beats.py` or restructuring the extractor package anyway.
  
  **Option C: Direct imports**
  Update `shared.py` to import from the actual source modules (`config`, `backends`, etc.) rather than through the hub. Eliminates the hub entirely. `extract_beats.py` becomes a CLI-only script.
  - Pros: Eliminates the hub pattern's indirection. Import sources are traceable.
  - Cons: Highest migration cost — all callers of `extract_beats` must be updated.
  - When to use: When the hub is actively causing confusion or circular import issues.
  
  **Anti-pattern threshold:** A re-export hub becomes harmful when: (1) it causes circular imports, (2) it obscures which module actually owns a symbol, or (3) it is a named script rather than `__init__.py`. The current `extract_beats.py` hub is borderline — it works but the `__init__.py` location would be more conventional.
  
  ---
  
  ## Question 5: Subprocess Management for CLI Tools
  
  ### Context
  
  `backends.py` spawns `claude -p` as a subprocess. Current implementation uses `subprocess.run()` with `capture_output=True`, `timeout=120`, `start_new_session=True`, explicit `env=` dict with 5 vars stripped, and explicit `cwd=` pointing to `~/.claude/cyberbrain/`.
  
  ### Key Facts
  
  - **`start_new_session=True`** is the correct modern replacement for `preexec_fn=os.setsid`. It is thread-safe (unlike `preexec_fn`), available since Python 3.2, and creates a new session + process group. The `preexec_fn` approach is not thread-safe and the Python docs since 3.12 explicitly recommend `start_new_session` instead.
  - **`subprocess.run()` vs `Popen`**: `run()` is correct for blocking invocations with a timeout. `Popen` is needed only if you require streaming output or non-blocking interaction. For `claude -p` (which buffers all output until complete), `run()` is appropriate.
  - **Timeout behavior**: When `subprocess.run()` times out, it raises `TimeoutExpired` but does NOT kill the process before re-raising in Python 3.3–3.11. As of Python 3.12, `run()` kills the process on timeout automatically. For earlier Python, manual kill is needed: catch `TimeoutExpired`, call `proc.kill()`, then `proc.communicate()`. The current code uses `subprocess.run()` — if targeting Python <3.12, the child process may continue running after a timeout exception.
  - **`start_new_session=True` and kill-on-timeout**: When a process is in a separate session, `proc.kill()` only kills the process leader, not any children it spawned. To kill the whole group: `os.killpg(os.getpgid(proc.pid), signal.SIGTERM)`. For `claude -p` which is unlikely to spawn long-lived children, this is low risk.
  - **Env var stripping**: The current approach (build a new dict from `os.environ.items()` excluding the 5 vars) is correct. The alternative `env=None` (inherit everything) would re-introduce the hang problem. The set-based exclusion is O(1) per var.
  - **Output size**: `capture_output=True` buffers all stdout/stderr in memory. For LLM responses this is fine. For transcript inputs >150K chars + response, memory is bounded.
  - **Shell PATH**: The current code handles the Claude Desktop PATH isolation problem (where `/opt/homebrew/bin` is not in PATH) with a fallback list. This is the right approach for a cross-environment tool.
  - **`communicate()` deadlock**: Not applicable when using `subprocess.run()` with `capture_output=True` — `run()` uses `communicate()` internally with pipe draining. The deadlock only affects manual `stdout.read()` + `stderr.read()` in sequence.
  
  ### Current Implementation Assessment
  
  The current implementation in `backends.py` lines 91–99 is correct for its purpose. The one gap: if the calling Python version is <3.12, a timeout will raise `TimeoutExpired` but not kill `claude`. The process will continue consuming resources in the background. Given that this project targets macOS with Homebrew Python (3.12+), this is likely not a practical issue but is worth documenting.
  
  ### Recommendations
  
  **Option A: Keep current implementation**
  - Pros: Correct, well-tested, handles the known edge cases (PATH isolation, session var stripping, neutral cwd).
  - Cons: Does not explicitly kill the process group on timeout (only relevant if claude spawns sub-children, which is unlikely for `-p` mode).
  - When to use: Current situation.
  
  **Option B: Add explicit kill-on-timeout for Python <3.12 robustness**
  Replace `subprocess.run()` with `Popen` + `communicate(timeout=...)` + explicit `proc.kill()` on `TimeoutExpired`. Or guard with `sys.version_info >= (3, 12)`.
  - Pros: Eliminates orphaned process risk.
  - Cons: More code for an edge case that has not manifested.
  - When to use: If Python <3.12 support is required or if timeout handling becomes a reported issue.
  
  ---
  
  ## Risks
  
  ### Question 1 (Module Decomposition)
  - **Circular imports**: If sub-modules in a `restructure/` package import from each other, circular import errors will occur at startup. The rule must be: `pipeline.py` (or `__init__.py`) imports from all others; leaf modules (`collect`, `cluster`, `generate`, etc.) do not import from `pipeline`. Enforcing this requires discipline or tooling (e.g. `import-linter`).
  - **Test breakage**: If any test imports from specific functions by name, splitting into sub-modules does not break them as long as the hub re-export in `__init__.py` is maintained.
  
  ### Question 2 (Configuration)
  - **Dict `.get()` with defaults**: The current code uses `config.get("key", default)` throughout. If migrating to a dataclass or pydantic model, every `.get()` call must be replaced with attribute access. This is a refactor across 15+ call sites, not just the config module.
  - **Unknown keys**: The current dict-based config silently accepts unknown keys from the JSON file. A dataclass or pydantic model will either ignore or reject unknown keys — behavior must be specified explicitly (`extra='ignore'` in pydantic).
  
  ### Question 3 (State Directory)
  - **Module-level path constants**: Several modules define paths at module level (e.g. `EXTRACT_LOG_PATH` at line 13-14 of `run_log.py`). These are evaluated at import time. If `_BASE` in a central `state.py` is computed at import time from `Path.home()`, this is fine. If it ever needs to be configurable (e.g. for tests using a temp dir), the module-level constant approach prevents clean overriding without monkeypatching.
  - **Test isolation**: Tests that write state files need to override paths. With scattered hardcoded paths, this requires monkeypatching in multiple modules. With a central `state.py`, only one module needs patching.
  
  ### Question 4 (Re-export Hub)
  - **mypy `--no-implicit-reexport`**: If strict type checking is added, all re-exports in `extract_beats.py` need `as X` aliases or an `__all__` list, or mypy will flag callers.
  - **Dual-role confusion**: New contributors seeing `extract_beats.py` used both as `python3 extract_beats.py` and `from extract_beats import X` may not understand the convention. A comment at the top of the file explaining this is the minimum mitigation.
  
  ### Question 5 (Subprocess)
  - **Python <3.12 timeout behavior**: As noted above, `subprocess.run(timeout=N)` does not kill the child on `TimeoutExpired` before 3.12. On macOS with Homebrew Python, this is likely 3.12+, but not guaranteed for all install paths.
  - **`start_new_session=True` prevents SIGINT propagation**: A Ctrl-C in the parent process does not propagate to the child. For the MCP server context (where Ctrl-C is not meaningful), this is intentional. For a CLI use case, it means the child must be killed explicitly on parent shutdown.
  - **`AllowedTools ""` in subprocess cmd**: The `--allowedTools ""` flag prevents `claude -p` from sending PermissionRequest IPC to the parent TUI. This is a correctness requirement, not just a best practice. If removed, the subprocess hangs waiting for user input that never comes.
  
  ---
  
