  # Research: Python MCP Tool Distribution Patterns (2025–2026)
  
  **Date**: 2026-03-10
  **Question**: How should cyberbrain move from its current install.sh model to a simpler, plugin-based distribution using uv?
  
  ---
  
  ## Summary
  
  The Python MCP ecosystem has converged on `uvx` as the de facto launch pattern for MCP servers, with PyPI as the canonical distribution channel. Claude Code 1.0.33+ introduced a first-class plugin system that handles hook registration, MCP server wiring, and marketplace-based installs — eliminating every manual step that cyberbrain's current `install.sh` performs. The recommended path is a two-phase migration: (1) add `pyproject.toml` now to make cyberbrain a proper Python package; (2) add the plugin manifest and `.mcp.json` to enable one-command installation via `/plugin install`. The only non-trivial code change required is fixing prompt path resolution in `mcp/shared.py`, which currently hardcodes `~/.claude/cyberbrain/prompts/`.
  
  ---
  
  ## 1. How basic-memory Distributes
  
  basic-memory (https://github.com/basicmachines-co/basic-memory) is the closest positive reference example for cyberbrain's target state.
  
  **Install command:**
  ```bash
  uv tool install basic-memory
  ```
  
  **MCP server launch command** (in `claude_desktop_config.json` or `.mcp.json`):
  ```json
  {
    "mcpServers": {
      "basic-memory": {
        "command": "uvx",
        "args": ["basic-memory", "mcp"]
      }
    }
  }
  ```
  
  **Update mechanism:**
  - Ships a `bm update` CLI subcommand
  - Auto-checks for updates every 24 hours (configurable in `~/.basic-memory/config.json`)
  - In uvx mode: update checks are skipped — the runtime environment is ephemeral, so the user controls the version via `uv tool upgrade basic-memory` or by pinning a version in the uvx invocation
  
  **Config handling:**
  - Config lives at `~/.basic-memory/config.json` (separate from the installed package code)
  - First-run initialization is handled by the CLI itself on first invocation — no installer prompts required
  
  **Key lesson:** basic-memory cleanly separates the *package* (installed via uv, versioned, updatable) from the *user data* (config + vault, in `~/.basic-memory/`, never touched by updates).
  
  ---
  
  ## 2. Survey of Other Python MCP Tools
  
  ### mcp-server-fetch (Anthropic reference server)
  - Distributed via PyPI as `mcp-server-fetch`
  - Launch: `{"command": "uvx", "args": ["mcp-server-fetch"]}`
  - No config file — stateless tool
  - uvx is the **primary and recommended** pattern, not an alternative
  
  ### mcp-agent (framework, not a server)
  - Distributed via PyPI, installed with `uv add mcp-agent` or `pip install mcp-agent`
  - Intended for building agents that *use* MCP servers, not distribution of MCP servers themselves
  - Its own config files reference MCP servers by their uvx launch commands
  
  ### fastmcp (Python MCP server framework, jlowin/fastmcp)
  - Distributed via PyPI, `uv pip install fastmcp`
  - Servers built with fastmcp run as `python server.py` — the framework doesn't prescribe distribution
  - Cyberbrain already uses fastmcp v3; this is consistent with the ecosystem
  
  ### mcp-server-memory (Anthropic reference server)
  - Node.js, uses `npx` — not directly comparable but illustrates that the JS ecosystem uses the same ephemeral-runner pattern (`npx` = Node's `uvx`)
  
  **Pattern consensus:** Every active Python MCP server in the ecosystem uses `uvx <package-name>` as the launch command. The only variable is whether the package lives on PyPI or is installed from a git URL.
  
  ---
  
  ## 3. uv Distribution Patterns
  
  ### uvx (uv tool run)
  Executes a tool in a **temporary, isolated environment**. The environment is created on first use and cached; subsequent invocations reuse the cache (fast). Because the environment is ephemeral from the host app's perspective, there's no "running version" to manage — the user controls it by pinning or upgrading.
  
  ```bash
  uvx basic-memory mcp          # run latest cached version
  uvx basic-memory@1.2.0 mcp   # run specific version
  ```
  
  **Best for MCP servers:** The host app (Claude Code or Claude Desktop) launches the server process — it doesn't matter that the environment is temporary. This is the pattern used by every Python MCP server surveyed.
  
  ### uv tool install
  Creates a **persistent installation** with an entry in `PATH`. Useful when a user wants to run a tool directly from the terminal (`bm update`, `basic-memory status`, etc.).
  
  ```bash
  uv tool install basic-memory
  uv tool upgrade basic-memory   # update to latest
  ```
  
  basic-memory uses this for the CLI entry point. For cyberbrain, this would be useful if cyberbrain ever ships a `cyberbrain` CLI command (e.g., `cyberbrain status`, `cyberbrain import`).
  
  ### uv run --with
  Adds transient dependencies to a script execution. Primarily a developer tool, not a distribution pattern. Not relevant for cyberbrain's use case.
  
  ### When to use which
  
  | Pattern | Use case |
  |---|---|
  | `uvx package-name` | MCP server launch (in `.mcp.json` or `claude_desktop_config.json`) |
  | `uv tool install` | CLI tools the user invokes directly |
  | `uv run --with` | Developer scripts, one-off dependency injection |
  
  ---
  
  ## 4. Installing from GitHub Without PyPI
  
  Yes — uvx and uv tool install both support git sources directly:
  
  ```bash
  # uvx from GitHub main branch
  uvx --from git+https://github.com/devnill/cyberbrain@main cyberbrain-mcp
  
  # uv tool install from GitHub
  uv tool install git+https://github.com/devnill/cyberbrain
  
  # Specific tag or commit
  uvx --from git+https://github.com/devnill/cyberbrain@v1.2.0 cyberbrain-mcp
  ```
  
  **Requirements for this to work:**
  - The repo must have a valid `pyproject.toml` with `[project]` metadata
  - The `[project.scripts]` section must define the entry point:
    ```toml
    [project.scripts]
    cyberbrain-mcp = "cyberbrain.mcp.server:main"
    ```
  
  This means cyberbrain could ship a plugin-based install *without ever publishing to PyPI*, using GitHub as the package source. PyPI is cleaner for discoverability but not required.
  
  ---
  
  ## 5. Multi-Machine Currency
  
  With the current `install.sh` model, keeping multiple machines in sync requires re-running install.sh on each machine after pulling updates — error-prone and manual.
  
  With uv:
  - `uv tool upgrade basic-memory` on each machine, or
  - Basic-memory's own auto-update mechanism handles it silently
  
  With the Claude Code plugin system (see Section 6):
  - `/plugin update cyberbrain@marketplace-name` on each machine, or
  - Auto-update is on by default for official marketplaces
  
  **uv's global tool cache** (`~/.local/share/uv/tools/` on macOS/Linux) is per-machine — it does not sync across machines. Each machine resolves and caches dependencies independently. This is expected behavior; uv is fast enough (~100ms cache hit) that this is not a practical problem.
  
  ---
  
  ## 6. The Claude Code Plugin System (Major Finding)
  
  Claude Code 1.0.33+ ships a first-class plugin distribution system that directly addresses cyberbrain's distribution problem. This system was not available when cyberbrain's install.sh was written.
  
  ### What plugins solve
  
  | Current install.sh task | Plugin system equivalent |
  |---|---|
  | Copy files to ~/.claude/cyberbrain/ | Plugin cached automatically to ~/.claude/plugins/cache/ |
  | Register PreCompact hook in settings.json | `hooks/hooks.json` in plugin dir, auto-registered |
  | Register MCP server in claude_desktop_config.json | `.mcp.json` in plugin dir, auto-registered |
  | Prompt user for vault path | `cb_configure` MCP tool handles on first use |
  | Create venv and install deps | `uvx` in `.mcp.json` command, uv manages transparently |
  | Version tracking (.cb-version file) | `plugin.json` version field |
  
  ### Plugin directory structure
  
  ```
  cyberbrain/                         # plugin root (the git repo)
  ├── .claude-plugin/
  │   └── plugin.json                 # manifest: name, version, description, author
  ├── hooks/
  │   └── hooks.json                  # PreCompact + SessionEnd hook registration
  ├── .mcp.json                       # MCP server launch config
  ├── mcp/                            # MCP server source
  ├── extractors/                     # extractor source
  ├── prompts/                        # prompt files (bundled with plugin)
  ├── pyproject.toml                  # Python package metadata
  └── ...
  ```
  
  ### plugin.json
  ```json
  {
    "name": "cyberbrain",
    "version": "1.3.0",
    "description": "Knowledge capture and retrieval for Claude sessions",
    "author": {
      "name": "Dan Shipper"
    },
    "repository": "https://github.com/devnill/cyberbrain"
  }
  ```
  
  ### hooks/hooks.json
  ```json
  {
    "hooks": {
      "PreCompact": [
        {
          "hooks": [
            {
              "type": "command",
              "command": "${CLAUDE_PLUGIN_ROOT}/hooks/pre-compact-extract.sh",
              "timeout": 120,
              "statusMessage": "Extracting knowledge before compaction..."
            }
          ]
        }
      ],
      "SessionEnd": [
        {
          "hooks": [
            {
              "type": "command",
              "command": "${CLAUDE_PLUGIN_ROOT}/hooks/session-end-extract.sh",
              "timeout": 120
            }
          ]
        }
      ]
    }
  }
  ```
  
  ### .mcp.json (uvx variant — requires PyPI or git source)
  ```json
  {
    "mcpServers": {
      "cyberbrain": {
        "command": "uvx",
        "args": ["cyberbrain-mcp"]
      }
    }
  }
  ```
  
  ### .mcp.json (CLAUDE_PLUGIN_ROOT variant — no PyPI required)
  ```json
  {
    "mcpServers": {
      "cyberbrain": {
        "command": "uv",
        "args": [
          "run",
          "--directory", "${CLAUDE_PLUGIN_ROOT}",
          "--with", "fastmcp>=3.0.0,pyyaml,ruamel.yaml",
          "python", "${CLAUDE_PLUGIN_ROOT}/mcp/server.py"
        ]
      }
    }
  }
  ```
  
  **Note:** `${CLAUDE_PLUGIN_ROOT}` is an environment variable provided by Claude Code pointing to the plugin's cached directory (inside `~/.claude/plugins/cache/`). It resolves the "where are my files" problem without hardcoding paths.
  
  ### Install flow with plugin system
  ```bash
  # User adds cyberbrain's GitHub repo as a marketplace (one time)
  /plugin marketplace add devnill/cyberbrain
  
  # User installs cyberbrain plugin
  /plugin install cyberbrain@devnill-cyberbrain
  
  # On first use, cb_configure guides vault setup (already implemented)
  
  # Updates
  /plugin update cyberbrain@devnill-cyberbrain
  # or auto-update if enabled in marketplace settings
  ```
  
  ### Key constraints
  - **Plugins are copied to `~/.claude/plugins/cache/`** — paths referencing files *outside* the plugin directory do not work after installation
  - `${CLAUDE_PLUGIN_ROOT}` is available in hook commands and MCP server config, but **not** necessarily inside the Python process itself (it's set in the environment by Claude Code before launching the server)
  - Plugin scope: user (default, `~/.claude/settings.json`), project (`.claude/settings.json`, shared via git), local (`.claude/settings.local.json`)
  
  ---
  
  ## 7. Cyberbrain-Specific Analysis
  
  ### Current prompt path resolution
  
  This is the most important code constraint for migration.
  
  **`extractors/config.py` line 14:**
  ```python
  PROMPTS_DIR = Path(__file__).parent.parent / "prompts"
  ```
  This is `__file__`-relative. When installed to `~/.claude/cyberbrain/extractors/config.py`, it resolves to `~/.claude/cyberbrain/prompts/`. When run from the source repo, it resolves to `repo/prompts/`. This pattern is **already portable** and will work correctly in a plugin model where `${CLAUDE_PLUGIN_ROOT}` maps to the cached plugin directory containing both `extractors/` and `prompts/`.
  
  **`mcp/shared.py` line 47:**
  ```python
  _PROMPTS_DIR = Path.home() / ".claude" / "cyberbrain" / "prompts"
  ```
  This is **hardcoded** to `~/.claude/cyberbrain/prompts/`. It has a dev-mode fallback to `Path(__file__).parent.parent / "prompts"`, but the primary path will break in a plugin model where prompts live in `~/.claude/plugins/cache/cyberbrain/prompts/`.
  
  **Required fix:** Change `mcp/shared.py` to use `__file__`-relative resolution as a primary path, with the hardcoded path as a migration fallback:
  ```python
  # Primary: relative to this file (works in both plugin and legacy installs)
  _PROMPTS_DIR = Path(__file__).parent.parent / "prompts"
  # Legacy fallback: old install.sh location
  _PROMPTS_DIR_LEGACY = Path.home() / ".claude" / "cyberbrain" / "prompts"
  ```
  
  ### Config path — no change needed
  
  `~/.claude/cyberbrain/config.json` is the right location for user config — it's persistent user data, not code. This path should remain hardcoded regardless of where the plugin code lives. The plugin system doesn't touch it; `cb_configure` continues to manage it. This is the same pattern basic-memory uses with `~/.basic-memory/config.json`.
  
  ### fastembed / usearch optional deps
  
  These are large optional dependencies (fastembed downloads ML models on first use; usearch is a native extension). In the uvx model, they'd be declared as optional extras:
  
  ```toml
  [project.optional-dependencies]
  semantic = [
      "fastembed>=0.3",
      "usearch==2.23.0",
  ]
  ```
  
  MCP launch with semantic search:
  ```json
  {
    "command": "uvx",
    "args": ["cyberbrain-mcp[semantic]"]
  }
  ```
  
  In the `${CLAUDE_PLUGIN_ROOT}` variant, the uv run command would include `--with "fastembed>=0.3,usearch==2.23.0"` when semantic search is desired. The `usearch==2.23.0` pin is important — newer versions have had breaking API changes.
  
  ### First-run vault setup
  
  Currently `install.sh` prompts interactively for the vault path. In a plugin model, there is no installer. The correct replacement is the existing `cb_configure` MCP tool — on first use, it guides the user through vault setup via conversation. This is already implemented and is actually a better UX than a terminal prompt.
  
  ### Hook scripts
  
  The existing `hooks/pre-compact-extract.sh` and `hooks/session-end-extract.sh` scripts reference the extractor by path. They currently invoke `python3 ~/.claude/cyberbrain/extractors/extract_beats.py`. In the plugin model, they would reference `${CLAUDE_PLUGIN_ROOT}/extractors/extract_beats.py` instead. This requires updating the hook scripts to use the env var.
  
  ---
  
  ## 8. Minimal Install Flow for Cyberbrain (Target State)
  
  **Prerequisites:** uv installed, Claude Code 1.0.33+
  
  ```bash
  # Step 1: Add marketplace (one time, registers cyberbrain as a known source)
  /plugin marketplace add devnill/cyberbrain
  
  # Step 2: Install
  /plugin install cyberbrain@devnill-cyberbrain
  
  # Step 3: First use — cb_configure guides vault setup
  # (in Claude Code or Claude Desktop, with cyberbrain MCP tools active)
  # Call cb_configure(discover=True) to set vault_path
  
  # Updates (whenever a new version is published)
  /plugin update cyberbrain@devnill-cyberbrain
  ```
  
  That's it. No cloning, no venv creation, no bash scripts, no settings.json editing.
  
  ---
  
  ## 9. Recommendation
  
  ### Phase 1: Add pyproject.toml (do this now, low effort)
  
  Even before building the full plugin structure, adding a `pyproject.toml` makes cyberbrain installable as a Python package and unblocks the uvx path. This is a one-file change with no code changes.
  
  ```toml
  [project]
  name = "cyberbrain-mcp"
  version = "1.3.0"
  description = "Knowledge capture and retrieval for Claude sessions"
  requires-python = ">=3.11"
  dependencies = [
      "fastmcp>=3.0.0",
      "mcp",
      "pyyaml>=6.0",
      "ruamel.yaml",
  ]
  
  [project.optional-dependencies]
  bedrock = ["anthropic>=0.40.0"]
  semantic = ["fastembed>=0.3", "usearch==2.23.0"]
  
  [project.scripts]
  cyberbrain-mcp = "cyberbrain.mcp.server:main"
  
  [build-system]
  requires = ["hatchling"]
  build-backend = "hatchling.build"
  ```
  
  With this, `install.sh` can replace its venv + pip dance with:
  ```bash
  uv sync  # or uv pip install .
  ```
  
  And users with uv can already test the uvx path via git source:
  ```json
  {
    "command": "uvx",
    "args": ["--from", "git+https://github.com/devnill/cyberbrain", "cyberbrain-mcp"]
  }
  ```
  
  ### Phase 2: Full plugin structure (do this before public launch)
  
  Add the plugin manifest files so cyberbrain can be distributed and installed through Claude Code's native plugin system:
  
  1. **`.claude-plugin/plugin.json`** — name, version, description, repository
  2. **`hooks/hooks.json`** — move PreCompact and SessionEnd hook definitions here; use `${CLAUDE_PLUGIN_ROOT}` for hook script paths
  3. **`.mcp.json`** — MCP server launch config using `${CLAUDE_PLUGIN_ROOT}` (or uvx once on PyPI)
  4. **Fix `mcp/shared.py` prompt path** — change primary `_PROMPTS_DIR` to `__file__`-relative; keep legacy `~/.claude/cyberbrain/prompts` as fallback for existing installs
  5. **Fix hook scripts** — replace hardcoded `~/.claude/cyberbrain/extractors/` with `${CLAUDE_PLUGIN_ROOT}/extractors/` (passed via env or script arg)
  6. **Remove or simplify `install.sh`** — keep a thin script for users who prefer manual install, but it's no longer the primary path
  
  **Do not rush to PyPI.** The `${CLAUDE_PLUGIN_ROOT}` + GitHub source approach works without PyPI publishing. Publish to PyPI when/if there's broader community demand. The git-source install via the plugin marketplace is sufficient for early adopters.
  
  ### What not to do
  
  - **Do not** use `uv run --with` as the MCP launch command — it's awkward to maintain and not what the ecosystem uses
  - **Do not** keep the venv at `~/.claude/cyberbrain/venv/` as the primary model — uv's toolchain cache is a better abstraction
  - **Do not** move config away from `~/.claude/cyberbrain/config.json` — it's the right location and users may already have it configured
  
  ### Summary judgment
  
  The Claude Code plugin system is the correct target distribution model for cyberbrain. It eliminates every manual step in `install.sh`, matches the direction the ecosystem is moving, and enables one-command install + auto-update across machines. The technical lift is modest: a `pyproject.toml`, three JSON manifest files, a one-line fix in `mcp/shared.py`, and updates to the hook scripts to use `${CLAUDE_PLUGIN_ROOT}`. basic-memory is proof that this model works well for Python MCP tools with user-specific config files.
  
  ---
  
