  - `mcp/shared.py:47` — _PROMPTS_DIR resolution (hardcoded, needs fix)
  - https://github.com/basicmachines-co/basic-memory — positive reference example; PyPI + uvx + ~/.basic-memory/config.json pattern
  - https://github.com/modelcontextprotocol/servers/src/fetch — mcp-server-fetch; uvx as primary launch pattern
  - https://code.claude.com/docs/en/plugins — Claude Code plugin system spec (requires Claude Code 1.0.33+)
