content: |
  ---
  topic: FastMCP v3 best practices and patterns
  date: 2026-03-21
  skill: refine
  ---
  
  ## Summary
  
  FastMCP v3 (released January 2026, current version 3.1.1, now under `PrefectHQ/fastmcp`) rebuilds the framework around three primitives: components, providers, and transforms. The `register(mcp)` closure pattern used in this project is not deprecated and remains functional, but is not the idiomatic v3 pattern. V3 introduces two alternative organizational approaches: server composition via `mount()`/`import_server()`, and `FileSystemProvider` for convention-based auto-discovery. V3 also adds formal dependency injection via `Depends()`, a structured middleware system, and lifespan context for shared state. No official large-project examples with 10+ tools were found.
  
  ## Key Facts
  
  - FastMCP 3.0 released January 19, 2026. Repository moved `jlowin/fastmcp` -> `PrefectHQ/fastmcp`. Imports and PyPI package name are unchanged.
  - Current version: **3.1.1**. The project pins `fastmcp>=3.0.0` with no upper bound.
  - V3's three new primitives: **Providers** (where components come from), **Transforms** (middleware on providers), **Components** (tools, resources, prompts as first-class objects).
  - **Breaking change in v3:** `@mcp.tool` now returns the original callable function unchanged. In v2 it returned a wrapper object. Mitigated via `FASTMCP_DECORATOR_MODE=object` env var.
  - **Deprecated in v3:** `mount(subserver, prefix="api")` -> replaced by `mount(subserver, namespace="api")`. Also `exclude_tags` -> replaced by `mcp.disable(tags={"internal"})`.
  - Synchronous tools are automatically dispatched to a threadpool in v3; they do not block the event loop.
  - `ToolError` raised inside a tool sends the message to the client as an error response. Any other exception sends a generic error when `mask_error_details=True`.
  - `Context` is injected automatically when a tool parameter is annotated as `Context`. Provides logging, progress reporting, resource access.
  - State methods are now async: `await ctx.get_state()` replaces `ctx.get_state()`.
  - **`FileSystemProvider`** (new in v3): scans a directory for Python files, auto-discovers functions decorated with standalone `@tool`, `@resource`, `@prompt` decorators that do not require a server import. With `reload=True`, re-scans on every request (development only).
  - **`Depends()`**: wraps any callable; its return value is injected at runtime; parameter is excluded from MCP schema (not visible to clients); cached per-request.
  - **`Shared()` from Docket is currently broken** in FastMCP tools (issue #3251). Raises `LookupError`. Affects process-wide singletons like connection pools or pre-loaded indexes.
  - `ctx.lifespan_context` provides access to data initialized at server startup. Multiple lifespan functions composable with `|` operator.
  - Middleware hierarchy: `on_message` (all JSON-RPC) -> `on_request` (all MCP requests) -> `on_call_tool` (tool calls). Raise `ToolError` inside middleware; do not skip `call_next()` to signal errors.
  - **HTTP-specific DI is unavailable on stdio transport.** Dependencies that access the HTTP request scope raise `RuntimeError` on stdio. This project uses stdio exclusively.
  - `ctx.set_state()` values must be JSON-serializable as of a recent 3.x release (undocumented breaking change, issue #3156).
  - `import_server()`: one-time static copy. `mount()`: live link, changes to sub-server propagate immediately.
  - No FastAPI-style `APIRouter`/`include_router` exists. GitHub issue #1494 proposed it; maintainer resolution was that `mount()` with sub-servers covers the use case.
  - No official examples with 10+ tools found in the official repository or documentation.
  - Resources: static URIs and dynamic templates both use `@mcp.resource`. Prompts use `@mcp.prompt()` and return `list[Message]`. Both patterns are stable in v3.
  
  ## Recommendations
  
  **Option 1: Keep the current `register(mcp)` closure pattern**
  - Pros: Works correctly today; no migration cost; closures capture module-level helpers without DI wiring; easy to test by calling `register()` on a test `FastMCP` instance.
  - Cons: Not idiomatic v3; requires `FastMCP` import in every tool file (only used for type annotation); `mcp` passed as parameter rather than being local to each module.
  - When to use: Default choice. No known deficiency in the current pattern.
  
  **Option 2: Server composition via `mount()` / `import_server()`**
  - Pros: Idiomatic v3 modular pattern; each sub-server is an independent `FastMCP` instance with its own middleware and lifespan; independently testable and runnable.
  - Cons: Namespace prefixing changes tool names visible to clients -- `cb_recall` becomes `recall_cb_recall` if a namespace is applied. This would break the project's own resource guide, user documentation, and any external references. Mounting without namespaces avoids renaming but creates collision risk. Each sub-server requires `FastMCP` boilerplate.
  - When to use: When tools need independent middleware or auth requirements, or when the project grows beyond the point where a single server becomes a coordination bottleneck.
  
  **Option 3: `FileSystemProvider` for auto-discovery**
  - Pros: Removes all explicit `register()` calls in `server.py`; new files are picked up without modifying any other file; cleanest decoupling -- tool files do not import the server at all.
  - Cons: Tool files must use standalone `@tool` decorator from `fastmcp.tools` rather than `@mcp.tool`; current tools use closures to share helpers from `shared.py` -- these would need to be converted to module-level imports or `Depends()`; convention-based discovery may be surprising; `reload=True` must not be used in production.
  - When to use: When new tool files are added frequently and registration boilerplate is the primary friction.
  
  **Option 4: `Depends()` for shared config injection (complement, not replacement)**
  - This is not an organizational alternative -- it is a complement to any pattern above. Currently, tools call `_load_config()` directly inside closures. `Depends(_load_config)` would make config injection explicit and testable, with per-request caching (config loaded once per tool call).
  - Pros: Testable by injecting a mock dependency; consistent across all tools.
  - Cons: `Shared()` for process-wide singletons is currently broken. `Depends()` adds parameter noise to function signatures. Minor verbosity increase.
  - When to use: If config loading or shared setup becomes a testing friction point.
  
  ## Risks
  
  - **Tool name stability with `mount()`.** Any namespace applied to sub-servers renames all tool names. This breaks the project's own resource guide, documentation, and user-facing prompts. Skipping namespaces avoids renaming but risks collisions.
  - **`Shared()` dependencies are broken.** Process-wide singletons via `Docket.Shared()` do not work in FastMCP tools as of 3.x (issue #3251). Workaround: lifespan context via `ctx.lifespan_context`, configured at the server level.
  - **`FileSystemProvider` reload=True in production.** Documented as development-only. Per-request directory scanning adds overhead.
  - **No upper bound on FastMCP version pin.** `fastmcp>=3.0.0` with no ceiling means a hypothetical 4.0 breaking release is pulled in automatically.
  - **`ctx.set_state()` serialization requirement.** Values must be JSON-serializable (undocumented breaking change in a 3.x point release, issue #3156). Complex objects in session state will fail at runtime.
  - **HTTP-specific DI unavailable on stdio.** `CurrentContext`, access token injection, and other HTTP-scope dependencies raise `RuntimeError` on stdio transport. This project cannot use these patterns.
  
  ## Sources
  
  - Introducing FastMCP 3.0 (jlowin.dev blog)
  - What's New in FastMCP 3.0 (jlowin.dev blog)
  - FastMCP GitHub (PrefectHQ/fastmcp)
  - FastMCP docs: Dependency Injection, MCP Context, Composing Servers, Mounting Servers, Filesystem Provider, Middleware, Lifespans
  - Upgrading from FastMCP 2 (gofastmcp.com)
  - FastMCP Changelog
  - GitHub issues: #948, #1494, #3251, #3156
  - Project files: server.py, tools/extract.py, tools/enrich.py, resources.py, pyproject.toml
