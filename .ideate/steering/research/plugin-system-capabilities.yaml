title: Claude Code Plugin System Capabilities
content: |
  # Claude Code Plugin System Capabilities
  
  **Research date:** 2026-03-10
  **Sources:** Official Claude Code plugin documentation at `code.claude.com/docs/en/`, GitHub issues #9444 and #11240 at `github.com/anthropics/claude-code/issues/`, Anthropic official plugin directory at `github.com/anthropics/claude-plugins-official`
  
  ---
  
  ## Executive Summary
  
  The Claude Code plugin system (released October 2025, requires CLI v1.0.33+) handles skills, agents, hooks, MCP servers, and LSP servers well. It cannot handle post-install scripts, Python venv creation, or interactive first-run configuration. Cyberbrain's install.sh has eight distinct responsibilities; the plugin system can absorb roughly three of them cleanly.
  
  ---
  
  ## 1. plugin.json Manifest — Supported Fields
  
  **Location:** `.claude-plugin/plugin.json` (the manifest itself is optional; Claude Code auto-discovers components at default locations if omitted)
  
  **Required:** only `name`
  
  ### Complete schema
  
  ```json
  {
    "name": "plugin-name",
    "version": "1.2.0",
    "description": "Brief plugin description",
    "author": {
      "name": "Author Name",
      "email": "author@example.com",
      "url": "https://github.com/author"
    },
    "homepage": "https://docs.example.com/plugin",
    "repository": "https://github.com/author/plugin",
    "license": "MIT",
    "keywords": ["keyword1", "keyword2"],
    "commands": ["./custom/commands/special.md"],
    "agents": "./custom/agents/",
    "skills": "./custom/skills/",
    "hooks": "./config/hooks.json",
    "mcpServers": "./mcp-config.json",
    "outputStyles": "./styles/",
    "lspServers": "./.lsp.json"
  }
  ```
  
  ### Field reference
  
  | Field | Type | What it does |
  |---|---|---|
  | `name` | string | Required. Unique identifier (kebab-case). Also the namespace prefix for all skills (`/cyberbrain:recall`). |
  | `version` | string | Semver string. Drives update detection — if unchanged, cached plugin is not re-fetched. Takes priority over marketplace entry version if both are set. |
  | `description` | string | Shown in the plugin manager UI. |
  | `author` | object | Attribution only. Fields: `name`, `email`, `url`. |
  | `homepage` | string | Documentation URL, displayed in UI. |
  | `repository` | string | Source URL. |
  | `license` | string | SPDX identifier (e.g. `"MIT"`). |
  | `keywords` | array | Discovery tags in marketplace search. |
  | `commands` | string \| array | Additional command file paths. Supplements (does not replace) the default `commands/` directory. |
  | `agents` | string \| array | Additional agent file paths. |
  | `skills` | string \| array | Additional skill directory paths. |
  | `hooks` | string \| array \| object | Path to hooks JSON file, array of paths, or inline hooks object. |
  | `mcpServers` | string \| array \| object | Path to `.mcp.json`, array of paths, or inline MCP config object. |
  | `outputStyles` | string \| array | Additional output style files. |
  | `lspServers` | string \| array \| object | Path to `.lsp.json` or inline LSP config. |
  
  **Not supported in plugin.json:**
  - `type` (library plugins — open feature request #9444)
  - `dependencies` (inter-plugin dependencies — open feature request #9444)
  - Any lifecycle scripts (open feature requests #11240, #9394)
  - `pip`, `npm`, or other package manager declarations
  
  ### Path rules
  
  - All paths must be relative to plugin root and start with `./`
  - Custom paths supplement default directories; they do not replace them
  - `${CLAUDE_PLUGIN_ROOT}` is an environment variable available in hook commands and MCP server configs containing the absolute path to the installed plugin directory
  
  ---
  
  ## 2. Post-Install / Lifecycle Hooks
  
  **Current status: Not supported.**
  
  GitHub issues #11240 (filed November 2025, closed as duplicate of #9394) and #9394 are open feature requests for `PreInstall`, `PostInstall`, `PreUninstall`, and `PostUninstall` hooks. Neither has an official Anthropic response or implementation date. As of 2026-03-10, there are zero lifecycle hooks for plugin installation events.
  
  The session-level hooks (`SessionStart`, `SessionEnd`, `PreCompact`, `PostToolUse`, etc.) fire during Claude Code sessions, not during plugin installation or update. A `SessionStart` hook in a plugin fires every time a session starts, not once at install time.
  
  **Workaround options:** None within the plugin system. Plugins that need first-run setup must document a manual step or rely on their MCP server's own initialization logic running at server startup.
  
  ---
  
  ## 3. MCP Server Bundling
  
  ### How it works
  
  MCP servers are declared in `.mcp.json` at the plugin root, or inline in `plugin.json` under `mcpServers`. Both formats are identical to standard MCP configuration.
  
  Plugin MCP servers start automatically when the plugin is enabled. They appear as standard MCP tools alongside any user-configured MCP servers.
  
  ### Format
  
  The `mcpServers` value in plugin.json can be:
  - A string path to a `.mcp.json` file: `"mcpServers": "./.mcp.json"`
  - An inline object (same schema as `.mcp.json`):
  
  ```json
  {
    "mcpServers": {
      "cyberbrain": {
        "command": "${CLAUDE_PLUGIN_ROOT}/venv/bin/python3",
        "args": ["${CLAUDE_PLUGIN_ROOT}/mcp/server.py"],
        "env": {
          "CYBERBRAIN_DIR": "${CLAUDE_PLUGIN_ROOT}"
        }
      }
    }
  }
  ```
  
  ### Relation to `.mcp.json`
  
  The `.mcp.json` at plugin root is the default location Claude Code looks for MCP config. When `mcpServers` in `plugin.json` points to a path, it is additive — both are loaded. The formats are identical.
  
  ### Restart behavior on plugin update
  
  When a plugin updates and its MCP server config changes, the user is shown a notification prompting them to run `/reload-plugins`. MCP server changes specifically may require a full Claude Code restart; the docs distinguish "some changes take effect immediately" (commands, hooks) from "LSP server updates require a restart." MCP server restarts on update are triggered by `/reload-plugins` or a full restart — there is no automatic, transparent restart.
  
  ### Critical path constraint
  
  Plugins are copied to a local cache at `~/.claude/plugins/cache` when installed from a marketplace. The plugin cannot reference files outside its directory (no `../` traversal). All paths in MCP server configs must use `${CLAUDE_PLUGIN_ROOT}` to point to files within the cached copy.
  
  ---
  
  ## 4. Python Dependency Management
  
  **Current status: Not natively supported by the plugin system.**
  
  There is no `requirements`, `pip`, or `uv` declaration in `plugin.json` schema. The plugin system cannot auto-install Python packages.
  
  ### What does exist
  
  The marketplace `source` field supports a `pip` source type for delivering the *plugin itself* as a pip package:
  
  ```json
  {
    "name": "my-plugin",
    "source": {
      "source": "pip",
      "package": "@acme/claude-plugin",
      "version": "2.1.0"
    }
  }
  ```
  
  This installs the plugin package via pip. It does not install that plugin's Python runtime dependencies (e.g., `fastmcp`, `pyyaml`). Runtime deps for MCP servers must be pre-installed or handled by the launch command.
  
  ### uvx pattern
  
  `uvx` (bundled with uv) is a practical workaround for Python MCP servers. It runs a package directly, resolving and isolating deps per-invocation:
  
  ```json
  {
    "mcpServers": {
      "cyberbrain": {
        "command": "uvx",
        "args": ["--with", "fastmcp", "--with", "pyyaml", "python3", "${CLAUDE_PLUGIN_ROOT}/mcp/server.py"]
      }
    }
  }
  ```
  
  Or using `uv run` pointing into a project with a `pyproject.toml`:
  
  ```json
  {
    "mcpServers": {
      "cyberbrain": {
        "command": "uv",
        "args": ["run", "--project", "${CLAUDE_PLUGIN_ROOT}", "python3", "mcp/server.py"]
      }
    }
  }
  ```
  
  **Constraints:**
  - Requires `uv` to be installed on the user's machine and in PATH
  - On first run, `uvx` downloads and caches the dependencies (network required)
  - The venv is created and managed by uv, not the plugin
  - `${CLAUDE_PLUGIN_ROOT}` points to the cached copy, not the repo — the `pyproject.toml` would need to be inside the plugin
  
  **Alternative: bundled venv**
  
  A plugin could ship with a pre-created venv inside its directory. This is impractical for distribution (venvs are large, platform-specific, not portable across Python versions) but possible for local/dev use with `--plugin-dir`.
  
  ---
  
  ## 5. Versioning and Updates
  
  ### Version format
  
  Semver (`MAJOR.MINOR.PATCH`), set in `plugin.json`. Claude Code uses the version field to detect whether to update a cached plugin. If the version string is unchanged, the cache is not invalidated even if the source files changed.
  
  ### Version authority
  
  When both `plugin.json` and `marketplace.json` specify a version, `plugin.json` wins silently. Anthropic's documentation explicitly warns against setting version in both places.
  
  For relative-path plugins (inside the same marketplace repo), set version in `marketplace.json`. For all other source types (GitHub, git URL, pip, npm), set version in `plugin.json`.
  
  ### Update mechanism
  
  Users update via:
  - `/plugin marketplace update marketplace-name` — refreshes the marketplace catalog and updates installed plugins to their latest versions
  - Auto-update at startup: enabled by default for official Anthropic marketplaces, disabled by default for third-party marketplaces; user can toggle per-marketplace
  
  After an update, users see a notification to run `/reload-plugins`. Skills, commands, and hooks reload immediately. MCP server changes may require a full restart.
  
  ### Pinning
  
  Marketplace entries can pin to a specific git ref or SHA:
  
  ```json
  {
    "source": {
      "source": "github",
      "repo": "owner/repo",
      "ref": "v2.0.0",
      "sha": "a1b2c3d..."
    }
  }
  ```
  
  ---
  
  ## 6. MCP Server Restart Behavior on Plugin Update
  
  No automatic transparent restart. The sequence is:
  1. Plugin update detected at startup or via `/plugin marketplace update`
  2. User notified: "plugin updated, run `/reload-plugins`"
  3. User runs `/reload-plugins`: commands and hooks reload immediately
  4. If MCP server config changed, a full Claude Code restart is required to pick up the new server process
  
  For Claude Desktop specifically, MCP server registration in `claude_desktop_config.json` must be updated manually or via the plugin system's integration; restarting Claude Desktop is always required to start a new MCP server process.
  
  ---
  
  ## 7. Plugin Marketplace Install Flow
  
  ### Official marketplace
  
  `claude-plugins-official` is pre-configured and available on first launch. No setup needed.
  
  ### User flow for third-party marketplace
  
  ```shell
  # Step 1: Register marketplace (one-time per machine)
  /plugin marketplace add owner/repo
  # or: claude plugin install --scope user
  
  # Step 2: Browse and install
  /plugin    # opens TUI, navigate to Discover tab
  # or: /plugin install plugin-name@marketplace-name
  
  # Step 3: Choose scope
  # user (default) — ~/.claude/settings.json — personal, all projects
  # project — .claude/settings.json — shared via git, team-wide
  # local — .claude/settings.local.json — gitignored, this project only
  
  # Step 4: Use immediately (skills, hooks)
  # or: /reload-plugins to pick up changes mid-session
  ```
  
  ### What happens at install
  
  1. Plugin source is fetched (git clone, npm install, pip install, or local copy)
  2. Plugin directory is copied to `~/.claude/plugins/cache/plugin-name@version/`
  3. Plugin name added to `enabledPlugins` in appropriate settings file
  4. Skills, agents, and hooks registered immediately (next session or `/reload-plugins`)
  5. MCP server config merged into Claude Code's active MCP configuration; server started on next session/restart
  
  **No post-install scripts run.** First-run configuration must happen at server startup or via documented manual steps.
  
  ---
  
  ## 8. uvx-Based Launch Pattern
  
  `uvx` is valid and works in plugin context. It is the recommended approach for Python MCP servers that need dependency isolation without a pre-built venv:
  
  ```json
  {
    "mcpServers": {
      "cyberbrain": {
        "command": "uvx",
        "args": [
          "--with", "fastmcp>=3.0.0",
          "--with", "mcp",
          "--with", "pyyaml",
          "--with", "ruamel.yaml",
          "python3", "${CLAUDE_PLUGIN_ROOT}/mcp/server.py"
        ]
      }
    }
  }
  ```
  
  **Pros:** No pre-created venv, no install.sh step for MCP dependencies, cross-platform, reproducible.
  
  **Cons:** Requires `uv` installed (Homebrew: `brew install uv`); first-run latency while uv downloads packages; fastembed and usearch (optional semantic search) are large wheels and will noticeably slow first-run startup; the `--with` flag approach does not use a lockfile so versions can drift.
  
  For the optional heavy deps (`fastembed>=0.3`, `usearch==2.23.0`), the `uv run` with `pyproject.toml` pattern is cleaner because it supports lockfiles:
  
  ```json
  {
    "command": "uv",
    "args": ["run", "--project", "${CLAUDE_PLUGIN_ROOT}", "python3", "mcp/server.py"]
  }
  ```
  
  This requires a `pyproject.toml` inside the plugin directory. The plugin's cached copy at `~/.claude/plugins/cache/` would include the `pyproject.toml` and uv would create a project venv the first time.
  
  ---
  
  ## 9. What install.sh Does vs. What the Plugin System Can Handle
  
  ### Current install.sh responsibilities
  
  | Step | What it does | Plugin system can handle? |
  |---|---|---|
  | M. Migration | Moves old scattered files into `~/.claude/cyberbrain/` subtree | No — one-time migration, cannot be expressed in plugin |
  | 1. Create directories | `mkdir -p ~/.claude/cyberbrain/{extractors,prompts,mcp}` | No — plugin copies to cache, not arbitrary dirs |
  | 2. Copy files | Copies extractors, prompts, mcp package to `~/.claude/cyberbrain/` | Partially — plugin system copies plugin to cache; hooks and MCP server are available from cache without needing a separate `~/.claude/cyberbrain/` tree |
  | 3. Config initialization | Interactive vault path prompt, writes `config.json` | No — no post-install hooks, no interactive setup |
  | 4. Register hooks | Writes PreCompact and SessionEnd entries to `~/.claude/settings.json` | Yes — plugin hooks in `hooks/hooks.json` auto-register on install |
  | 5. Python dependencies | pip installs pyyaml, ruamel.yaml; creates venv, installs fastmcp, mcp, optionally fastembed/usearch | Partially — uv/uvx can handle the MCP venv on first run; pyyaml/ruamel for extractor still needs manual install or uv |
  | 6. Credential/CLI check | Validates `claude` in PATH, AWS credentials, etc. | No — no pre/post-install hooks |
  | 7. Register MCP in Claude Desktop | Writes to `~/Library/Application Support/Claude/claude_desktop_config.json` | Yes — plugin MCP servers register automatically |
  | 8. Prune stale index | Runs Python script to clean search index | No — no post-install hooks |
  
  ---
  
  ## 10. Assessment of Cyberbrain's Existing plugin.json
  
  Current skeleton at `.claude-plugin/plugin.json`:
  
  ```json
  {
    "name": "cyberbrain",
    "version": "0.1.0",
    "description": "...",
    "author": "dan",
    "skills": "./skills/",
    "hooks": "./hooks/hooks.json",
    "mcpServers": "./.mcp.json"
  }
  ```
  
  ### Field-by-field assessment
  
  | Field | Valid? | Notes |
  |---|---|---|
  | `name` | Yes | Required field, correctly set |
  | `version` | Yes | Valid semver |
  | `description` | Yes | Valid |
  | `author` | Partially | Should be an object `{"name": "dan"}`, not a bare string — the schema defines `author` as an object with `name`, `email`, `url` |
  | `skills` | Yes | Valid path reference to `./skills/` |
  | `hooks` | Yes | Valid path to `./hooks/hooks.json` |
  | `mcpServers` | Yes | Valid path to `./.mcp.json` |
  
  ### Issue: author field type
  
  The current `"author": "dan"` is a bare string. The official schema defines `author` as an object. Anthropic's docs show `{"name": "...", "email": "..."}`. This may be silently ignored or cause a validation warning — check with `claude plugin validate .`.
  
  ### Issue: .mcp.json uses `uv run --with mcp` without `${CLAUDE_PLUGIN_ROOT}`
  
  Current `.mcp.json`:
  ```json
  {
    "mcpServers": {
      "cyberbrain": {
        "command": "uv",
        "args": ["run", "--with", "mcp", "python3", "mcp/server.py"]
      }
    }
  }
  ```
  
  Problems when used as a plugin:
  1. `mcp/server.py` is a relative path — it resolves relative to the working directory at launch time, which is undefined after installation to cache. Must use `${CLAUDE_PLUGIN_ROOT}/mcp/server.py`.
  2. `--with mcp` only installs the `mcp` package; `fastmcp`, `pyyaml`, `ruamel.yaml` are missing.
  3. No `pyproject.toml` in the plugin, so `uv run` without `--with` for all deps will fail.
  
  This is the dev-mode config — it works from the repo root where `mcp/server.py` exists. It would not work from the plugin cache without path fixes and full dep declarations.
  
  ---
  
  ## Recommendation
  
  ### What the plugin system can handle
  
  1. **Skills** — all skills in `skills/` auto-register on install. No change needed.
  2. **Hooks** — PreCompact and SessionEnd hooks in `hooks/hooks.json` auto-register on install, replacing install.sh step 4 entirely.
  3. **MCP server registration** — plugin MCP servers register automatically in Claude Code. This replaces install.sh step 7 for Claude Code (not Claude Desktop separately; the plugin system handles Claude Code's own MCP config, but Claude Desktop registration is separate).
  
  ### What must stay in install.sh (or an equivalent setup step)
  
  1. **Config initialization** (vault path prompt, writing `config.json`) — no plugin lifecycle hooks exist. This cannot be automated on install. Keep in install.sh or handle via a first-run prompt in the MCP server itself on first tool call.
  2. **File migration** (step M) — one-time, cannot be expressed in plugin.
  3. **Copying files to `~/.claude/cyberbrain/`** — if the extractor (`extract_beats.py`) needs to live at a known absolute path for the PreCompact hook, the plugin cache path (`~/.claude/plugins/cache/cyberbrain@x.y.z/`) changes on version bump. Either: (a) keep install.sh copying to a stable path, or (b) have the hook use `${CLAUDE_PLUGIN_ROOT}` and accept that hook paths in `settings.json` must update on upgrade.
  4. **Credential/CLI validation** — no pre/post-install hooks.
  5. **Search index pruning** — no post-install hooks.
  
  ### What uv can handle (replacing install.sh step 5)
  
  Replace the venv creation in install.sh with a `pyproject.toml` in the plugin directory declaring all MCP server dependencies. The MCP server launch command becomes:
  
  ```json
  {
    "mcpServers": {
      "cyberbrain": {
        "command": "uv",
        "args": ["run", "--project", "${CLAUDE_PLUGIN_ROOT}", "python3", "${CLAUDE_PLUGIN_ROOT}/mcp/server.py"]
      }
    }
  }
  ```
  
  uv creates and manages the project venv at `~/.claude/plugins/cache/cyberbrain@x.y.z/.venv` on first run. This eliminates the need to pre-create a venv in install.sh.
  
  For the extractor (`extract_beats.py`, called by the hook subprocess), it uses pyyaml and ruamel.yaml. These need to be available at hook run time. The hook could use `uv run --project ${CLAUDE_PLUGIN_ROOT} python3 ${CLAUDE_PLUGIN_ROOT}/extractors/extract_beats.py` to pull them from the same uv-managed venv.
  
  **Prerequisite:** `uv` must be installed on the user's machine. This is a new external dependency that install.sh currently does not require (it uses system pip/python3).
  
  ### Recommended split
  
  ```
  Plugin system handles:
    - skills/         (auto-registered)
    - hooks/          (auto-registered, replacing settings.json manipulation)
    - MCP server      (auto-registered in Claude Code, using uv run)
  
  uv handles:
    - fastmcp, mcp, pyyaml, ruamel.yaml, fastembed, usearch
      (via pyproject.toml + uv run, no pre-created venv needed)
  
  install.sh (simplified, kept for):
    - Interactive config initialization (vault path prompt)
    - File migration (one-time, for existing users)
    - Claude Desktop MCP registration (separate from Claude Code plugin system)
    - Optional: credential/CLI validation and guidance
    - Optional: uv presence check and install guidance
  ```
  
  The plugin system reduces install.sh from 456 lines to a focused ~100-line setup script that handles only what the plugin system cannot: first-run config and Claude Desktop registration.
  
