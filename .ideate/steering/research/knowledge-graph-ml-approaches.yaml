title: Knowledge Graph + ML Approaches for Semantic Search Enhancement
content: |
  # Knowledge Graph + ML Approaches for Semantic Search Enhancement
  
  **Date:** 2026-03-09
  **Status:** Research complete
  **Scope:** Evaluate graph-based methods to augment cyberbrain's existing hybrid search (FTS5 BM25 + fastembed/usearch RRF fusion)
  
  ---
  
  ## Current State
  
  Cyberbrain's search infrastructure:
  - **FTS5 BM25** keyword search with column weights (title=10, summary=5, tags=3, body=1)
  - **Semantic search** via fastembed (TaylorAI/bge-micro-v2, 384-dim) + usearch HNSW
  - **RRF fusion** (k=60) combining both signals
  - **Metadata-only embedding**: title + summary + tags (not full body)
  - **Relations table** in SQLite: `(from_id, relation_type, to_title, resolved)`
  - **Relation vocabulary**: 6 predicates — `related`, `references`, `broader`, `narrower`, `supersedes`, `wasDerivedFrom`
  - **Frontmatter**: `related:` wikilinks; body: `## Relations` section with typed predicates
  - **Scale**: 1K-10K notes, sparse graph (most notes have 0-3 relations)
  
  ---
  
  ## 1. Graph Embedding Methods
  
  ### 1.1 TransE
  
  **How it works:** Models relations as translations in embedding space. For a triple (h, r, t), it learns embeddings such that h + r ~ t. Simple, fast, effective for 1-to-1 relations.
  
  **Python implementation:** [PyKEEN](https://github.com/pykeen/pykeen) is the standard library. Also available in DeepGraphLearning/KnowledgeGraphEmbedding. [SparseTransX](https://github.com/HipGraph/SpTransX) offers optimized sparse implementations (up to 5.3x CPU speedup).
  
  **Suitability for cyberbrain:** Poor. TransE requires thousands of triples to learn meaningful embeddings. A vault with 2K notes and an average of 1.5 relations per note yields ~3K triples across 6 relation types. This is below the practical threshold where TransE produces useful signal. The Nations dataset (smallest PyKEEN benchmark) has 1,992 triples across 55 relations and 14 entities — a much denser graph per entity than a personal vault. TransE also struggles with 1-to-N and N-to-N relations, which are common in knowledge vaults (multiple notes can be `related` to the same topic).
  
  **Verdict:** Not viable at personal vault scale. The graph is too sparse for translational embeddings to converge to useful representations.
  
  ### 1.2 RotatE
  
  **How it works:** Models relations as rotations in complex vector space. For a triple (h, r, t), it learns h * r ~ t where * is element-wise complex multiplication. Handles symmetric, antisymmetric, inverse, and compositional relation patterns — strictly more expressive than TransE.
  
  **Python implementation:** PyKEEN, DeepGraphLearning/KnowledgeGraphEmbedding. Recent work (TP-RotatE, 2025) combines path information with RotatE for richer representations.
  
  **Suitability for cyberbrain:** Same fundamental problem as TransE — insufficient triple density. RotatE's expressiveness advantage over TransE is irrelevant when the training signal is too sparse. The 6 relation types are theoretically sufficient for RotatE (it handles diverse relation patterns), but the number of triples per relation type would be very small (hundreds at best), leading to poor generalization.
  
  **Verdict:** Not viable at personal vault scale for the same density reasons as TransE.
  
  ### 1.3 Node2Vec
  
  **How it works:** Generates node embeddings by running biased random walks on the graph, then applying Word2Vec (skip-gram) to the walk sequences. Two parameters (p, q) control whether walks explore locally (BFS-like) or globally (DFS-like), capturing structural equivalence and homophily.
  
  **Python implementation:** Multiple options — `node2vec` (pip), `nodevectors` (fastest, by VHRanger), `stellargraph`, and Neo4j GDS. NetworkX can generate walks directly. Lightweight; no PyTorch required with `nodevectors`.
  
  **Suitability for cyberbrain:** Marginal. Node2vec works on graphs with a few hundred nodes, but quality depends on graph connectivity. In a sparse vault graph where most nodes have 0-3 edges, random walks will be very short and repetitive, producing low-quality embeddings. Link prediction accuracy for node2vec is ~35% vs ~75% for GNNs on standard benchmarks — and those benchmarks use much denser graphs.
  
  The real question: what would node2vec embeddings capture that text embeddings don't? For a personal vault, two notes that are semantically similar (captured by text embeddings) are almost always the same notes that would be structurally close in the graph. The graph signal is largely redundant with the text signal at this scale.
  
  **Verdict:** Marginal value. Could produce a weak complementary signal, but the sparse graph limits quality. The dependency footprint is small (`nodevectors` is lightweight), but the quality improvement is unlikely to justify the complexity.
  
  ---
  
  ## 2. GNN Approaches
  
  ### 2.1 GCN (Graph Convolutional Networks)
  
  **How it works:** Aggregates feature vectors from a node's neighbors via spectral convolution, producing embeddings that encode both node features and local graph structure. Requires all nodes to be present during training (transductive).
  
  **Suitability:** For graphs under 10K nodes, GCN is "a strong and simple baseline that is often difficult to beat." However, it requires node features as input — in cyberbrain's case, the text embeddings would serve as input features, and GCN would refine them using graph structure.
  
  **The problem:** GCN is transductive — every time a new note is added, the entire model must be retrained. At personal vault scale this takes seconds, but it means the index cannot be updated incrementally. This breaks cyberbrain's current architecture where `index_note()` is called after each note write.
  
  ### 2.2 GraphSAGE
  
  **How it works:** Learns aggregation functions over node neighborhoods rather than per-node embeddings. Inductive — can embed new nodes without retraining. Uses neighborhood sampling to scale to large graphs.
  
  **Suitability:** GraphSAGE's inductive capability is appealing for a growing vault. However, "GraphSage is intended for use on large graphs (>100,000 nodes), as the overhead of subsampling will start to outweigh its benefits on smaller graphs." On small graphs, GraphSAGE is slower per epoch than GCN with no quality benefit.
  
  ### 2.3 GNN Verdict
  
  **Not recommended at this scale.** Both GCN and GraphSAGE require PyTorch (or at minimum PyTorch Geometric / DGL), adding 500MB+ to the dependency footprint. The quality improvement over text embeddings alone is questionable when the graph is sparse. GNNs shine when graph structure carries signal that text doesn't — in a personal vault, the text already captures the semantic relationships that the graph encodes.
  
  If GNNs were ever warranted, the approach would be: use text embeddings as node features, run a 2-layer GCN to produce "graph-aware" embeddings, and use those for retrieval. But at 1K-10K notes with sparse edges, the GCN layer would barely modify the text embeddings.
  
  ---
  
  ## 3. Typed-Edge Traversal Strategies
  
  This is the most promising direction for cyberbrain. The question is whether SQL-based approaches suffice or whether actual graph algorithms are needed.
  
  ### 3.1 SQLite Recursive CTEs
  
  SQLite supports recursive CTEs natively. For cyberbrain's `relations` table:
  
  ```sql
  -- Find all notes reachable within 2 hops from a seed note
  WITH RECURSIVE reachable(note_id, depth, path) AS (
      -- Seed: direct search results
      SELECT from_id, 0, from_id
      FROM relations
      WHERE from_id IN (/* seed note IDs from search */)
      UNION ALL
      -- Traverse relations
      SELECT r.to_title, re.depth + 1, re.path || '→' || r.to_title
      FROM relations r
      JOIN reachable re ON r.from_id = re.note_id
      WHERE re.depth < 2
  )
  SELECT DISTINCT note_id FROM reachable;
  ```
  
  **Strengths:**
  - Zero additional dependencies — uses existing SQLite database
  - Type-filtered traversal is trivial: `WHERE r.relation_type IN ('broader', 'narrower')`
  - Performance is excellent at this scale — 10K nodes, ~15K edges, 2-hop traversal completes in <1ms
  - Incremental — new relations are immediately traversable after INSERT
  
  **Weaknesses:**
  - No cycle detection (SQLite recursive CTEs will revisit nodes unless manually tracked via path)
  - No weighted shortest path (but not needed for retrieval boosting)
  - Complex multi-hop patterns require increasingly baroque SQL
  
  **Verdict:** Sufficient for cyberbrain's needs. A 2-hop typed traversal from search result seeds is the highest-value graph enhancement, and SQLite CTEs handle it cleanly.
  
  ### 3.2 In-Memory Graph Libraries (NetworkX, igraph)
  
  **NetworkX:** Pure Python, very easy to use, excellent support for typed/labeled edges and arbitrary edge attributes. At 10K nodes and 15K edges, all operations complete in milliseconds. The API is natural for graph exploration. However, it adds a dependency and requires loading the graph into memory on each MCP server startup.
  
  **igraph:** C-backed, ~40-250x faster than NetworkX for graph algorithms. Overkill at personal vault scale where NetworkX operations already take <1ms. Less Pythonic API. More complex typed-edge handling.
  
  **rustworkx:** Rust-backed Python library. Fastest option but least flexible for typed edges. Not worth the complexity at this scale.
  
  **Verdict:** NetworkX would be the right choice if graph operations exceeded what SQL CTEs can express — for example, community detection, centrality analysis, or complex path-finding. For simple 2-hop traversal with type filtering, SQLite CTEs are simpler and add no dependencies.
  
  ### 3.3 Recommended Approach: SQL-Based Typed Traversal
  
  The minimum viable graph enhancement for cyberbrain:
  
  1. **After RRF fusion produces ranked results**, take the top-N result note IDs
  2. **Run a typed CTE** to find notes within 2 hops via `broader`, `narrower`, `references`, or `related` edges
  3. **Score graph-adjacent notes** with a decaying weight: 1-hop = 0.5x base score, 2-hop = 0.25x
  4. **Merge** graph-discovered notes into the result set, deduplicating against existing results
  5. **Re-rank** the merged set
  
  This adds graph signal to retrieval without replacing any existing infrastructure. The relation types that matter most for retrieval expansion:
  - `broader` / `narrower` — topic hierarchy traversal (find parent/child concepts)
  - `references` — citation chains
  - `related` — catch-all associative links
  - `supersedes` — version chains (useful for finding the current note)
  
  The types `wasDerivedFrom` and `supersedes` are less useful for retrieval expansion and more useful for provenance tracking.
  
  ---
  
  ## 4. Hybrid Graph + Vector Retrieval Architecture
  
  ### 4.1 How Others Do It
  
  The dominant pattern in GraphRAG systems (as seen in Neo4j + Qdrant, LlamaIndex, and research systems like HybridRAG) is **dual-channel retrieval**:
  
  1. **Vector channel**: Standard embedding similarity search
  2. **Graph channel**: Structured traversal from seed entities
  3. **Fusion**: RRF or weighted combination of both channels
  
  This is exactly the pattern cyberbrain should follow, extending its existing RRF fusion from 2-channel (BM25 + semantic) to 3-channel (BM25 + semantic + graph).
  
  ### 4.2 Proposed 3-Channel Architecture for Cyberbrain
  
  ```
  Query
    ├── Channel 1: FTS5 BM25 (keyword) → ranked list
    ├── Channel 2: usearch HNSW (semantic) → ranked list
    └── Channel 3: Graph traversal (structural) → ranked list
        └── Seeds: top-5 from Channel 1+2 RRF
        └── Expand: 2-hop typed CTE
        └── Score: decay by hop distance
  
  RRF fusion (3-way) → final ranked results
  ```
  
  The graph channel is **seeded by the other two channels** — it doesn't run independently. This is important because graph traversal without a seed is just "find all notes," which is useless. The graph channel's job is to surface notes that are structurally connected to the semantically relevant notes but might not match the query text or embedding directly.
  
  ### 4.3 Implementation Sketch
  
  ```python
  def graph_expand(seed_ids: list[str], conn: sqlite3.Connection, max_hops: int = 2) -> list[SearchResult]:
      """Expand seed notes via typed relation traversal."""
      placeholders = ",".join("?" * len(seed_ids))
      rows = conn.execute(f"""
          WITH RECURSIVE reachable(note_id, depth, via_type) AS (
              SELECT to_title, 1, relation_type
              FROM relations
              WHERE from_id IN ({placeholders})
              UNION ALL
              SELECT r.to_title, re.depth + 1, r.relation_type
              FROM relations r
              JOIN reachable re ON r.from_id = re.note_id
              WHERE re.depth < ?
          )
          SELECT DISTINCT note_id, MIN(depth) as min_depth
          FROM reachable
          GROUP BY note_id
      """, (*seed_ids, max_hops)).fetchall()
  
      results = []
      for row in rows:
          # Score decays with distance: 1/(k + rank) equivalent
          hop_score = 1.0 / (2 ** row["min_depth"])  # 0.5 for 1-hop, 0.25 for 2-hop
          # Look up note metadata from notes table
          note = conn.execute("SELECT * FROM notes WHERE id = ?", (row["note_id"],)).fetchone()
          if note:
              results.append(SearchResult(
                  path=note["path"],
                  title=note["title"],
                  score=hop_score,
                  backend="graph",
                  # ... other fields
              ))
      return results
  ```
  
  Then extend `_rrf_fuse` to accept 3 ranked lists instead of 2.
  
  ### 4.4 When Graph Signal Helps Most
  
  Graph traversal adds the most value in these scenarios:
  - **Topic exploration**: "What do I know about caching?" — graph finds the broader topic hierarchy
  - **Following chains**: A note about a decision references the problem note that motivated it
  - **Supersession**: Finding the latest version of a note that has been superseded
  - **Indirect relevance**: Note A is about "Redis eviction policies" and is related to Note B about "cache warming strategies" — a query about Redis might not surface B via text similarity, but graph traversal from A would
  
  Graph traversal adds the least value when:
  - The query is a direct lookup ("what was the Redis config")
  - Notes are disconnected (no relations)
  - The vault is small enough that semantic search already surfaces most relevant notes
  
  ---
  
  ## 5. Graph Database Comparison
  
  ### 5.1 Neo4j
  
  **Strengths:** Most mature graph database. Cypher query language is expressive. Excellent ecosystem (GDS library with node2vec, PageRank, community detection built in). Well-documented.
  
  **Weaknesses for cyberbrain:** Requires a separate server process. Java dependency. Massive footprint (~500MB+). Community edition license restrictions. Completely misaligned with cyberbrain's "SQLite over Postgres, flat files over daemons" philosophy.
  
  **Verdict:** Ruled out. Architectural mismatch.
  
  ### 5.2 Kuzu (Archived)
  
  **Strengths:** Was the most promising embedded graph database. Cypher-compatible, pip-installable, in-process (like SQLite for graphs). 18x faster ingestion than Neo4j. Built-in vector search and FTS.
  
  **Critical problem:** As of October 2025, Kuzu's GitHub repository has been archived. The developers are "working on something new" and will no longer actively support KuzuDB. This makes it unsuitable for new projects — adopting an abandoned database is a significant risk.
  
  **Verdict:** Ruled out due to project abandonment. Would have been the ideal choice otherwise.
  
  ### 5.3 DuckPGQ (DuckDB Graph Extension)
  
  **Strengths:** Mentioned as Kuzu's spiritual successor. Graph queries within DuckDB's analytical engine. Active development.
  
  **Weaknesses:** Still early. DuckDB itself is a heavier dependency than SQLite. The graph extension is not yet mature. DuckDB's OLAP orientation doesn't align well with cyberbrain's single-note-at-a-time update pattern.
  
  **Verdict:** Worth watching but not ready for adoption.
  
  ### 5.4 FalkorDB Lite
  
  **Strengths:** Embedded Python graph database. Redis-compatible query language.
  
  **Weaknesses:** Small community. Less proven than alternatives. Adds a new query paradigm.
  
  **Verdict:** Insufficient maturity and community for a dependency.
  
  ### 5.5 SQLite with Recursive CTEs
  
  **Strengths:**
  - Zero new dependencies — cyberbrain already uses SQLite for the search index
  - The `relations` table already exists with the right schema
  - Recursive CTEs handle 2-hop traversal cleanly
  - Incremental updates are trivial (INSERT/DELETE on the relations table)
  - Performance is excellent at 1K-10K scale (sub-millisecond for 2-hop traversal)
  - No new query language to learn or maintain
  
  **Weaknesses:**
  - No native shortest-path algorithm (must implement in CTE with cycle detection)
  - No built-in community detection, centrality, or other graph algorithms
  - Complex multi-hop patterns require verbose SQL
  - No graph visualization or exploration tools
  
  **Verdict:** The right choice for cyberbrain. The existing relations table + recursive CTEs provide everything needed for retrieval-oriented graph traversal. Advanced graph algorithms (community detection, centrality) can be added later via NetworkX if proven valuable, loading from the same SQLite data.
  
  ### 5.6 NetworkX (In-Memory Supplement)
  
  **Strengths:** Could be loaded from the SQLite relations table at MCP server startup. Provides algorithms not available in SQL: PageRank, betweenness centrality, community detection, connected components. Pure Python, ~3MB dependency.
  
  **When warranted:** If cyberbrain adds features like "find the most central notes in this topic cluster" or "detect communities of related notes," NetworkX becomes valuable. For retrieval augmentation alone, SQLite CTEs suffice.
  
  **Verdict:** Keep in reserve. Add when a specific graph algorithm is needed that SQL cannot express.
  
  ### 5.7 Summary Table
  
  | Approach | Dependency Footprint | Setup Complexity | Query Power | Fits Architecture | Recommended |
  |---|---|---|---|---|---|
  | SQLite recursive CTEs | None (existing) | None | 2-hop typed traversal | Perfect | **Yes — Phase 1** |
  | NetworkX | ~3MB pip install | Load graph at startup | Full graph algorithms | Good | Reserve for Phase 2 |
  | igraph | ~10MB pip + C lib | Load graph at startup | Full graph algorithms, faster | Acceptable | Not needed at scale |
  | Neo4j | ~500MB + JVM | Server process | Full Cypher | Poor | No |
  | Kuzu | ~50MB pip | In-process | Full Cypher | Was good | No (archived) |
  | DuckPGQ | ~100MB via DuckDB | Extension setup | Graph SQL | Moderate | Watch, don't adopt |
  
  ---
  
  ## 6. Answers to Key Questions
  
  ### Q1: At personal vault scale (1K-10K notes, sparse graph), do graph methods add meaningful signal over dense vector similarity?
  
  **Conditional yes.** Graph traversal adds signal that text embeddings cannot capture: structural relationships like topic hierarchies (broader/narrower), version chains (supersedes), and citation networks (references). However, the magnitude of improvement depends entirely on graph density. With the current average of ~1.5 relations per note, the graph is too sparse for embedding-based methods (TransE, RotatE, node2vec) to produce useful results. Simple typed traversal (SQL CTEs) is the right tool — it extracts the graph signal that exists without trying to learn patterns from insufficient data.
  
  **Expected improvement:** Modest but real. In queries where the most relevant note is not a direct text match but is 1-2 hops away from a text match, graph expansion will surface it. This is perhaps 10-20% of queries. For the other 80-90%, the graph channel will either agree with the text channels (adding confidence) or contribute nothing (most notes have no relations).
  
  ### Q2: Is the current relation vocabulary (6 types) sufficient for graph-based methods?
  
  **Yes, for traversal-based methods.** The current 6 predicates (`related`, `references`, `broader`, `narrower`, `supersedes`, `wasDerivedFrom`) provide meaningful type information for filtered traversal. You can expand "broader" links but not "supersedes" links when doing topic exploration.
  
  **No, for embedding-based methods.** TransE/RotatE need many triples per relation type to learn the translational/rotational pattern. With 6 types spread across ~3K triples, each type averages ~500 triples — borderline for TransE, insufficient for RotatE's more complex parameterization.
  
  **Recommendation:** The vocabulary is fine. Don't expand it for the sake of graph methods. Expand it only if the extraction LLM naturally produces more nuanced relations and users find them valuable for navigation.
  
  ### Q3: What's the minimum viable graph enhancement?
  
  **Typed edge traversal in SQL.** Specifically:
  
  1. Take top-5 search results from existing RRF fusion
  2. Run a 2-hop recursive CTE on the relations table, filtered by useful relation types
  3. Score graph-discovered notes by hop distance (decaying weight)
  4. Merge into the result set via 3-way RRF
  
  This requires zero new dependencies, ~50 lines of Python, and uses the existing relations table. It can be implemented and shipped in a single session.
  
  ### Q4: How do graph embeddings compare to text embeddings for retrieval? Are they complementary?
  
  **At this scale, barely complementary.** Graph embeddings (TransE, RotatE, node2vec) encode structural position — "this note is connected to these other notes via these relation types." Text embeddings encode semantic content — "this note is about caching strategies." In a personal vault where the author creates relations between semantically related notes, these signals are highly correlated. The structural signal is a noisy, redundant version of the semantic signal.
  
  Graph embeddings become genuinely complementary at scale (100K+ nodes) and density (10+ edges per node) where structural patterns emerge that text alone doesn't capture — for example, "notes that occupy similar positions in the citation network tend to be about related topics even when their text differs."
  
  **Simple typed traversal**, by contrast, is complementary to text embeddings because it captures explicit, typed relationships (not statistical patterns). "Note A supersedes Note B" is a fact that no amount of text embedding will capture.
  
  ### Q5: If we move to hosted deployment later, which approaches scale well?
  
  | Approach | Scales to hosted? | Notes |
  |---|---|---|
  | SQLite recursive CTEs | Migrate to Postgres CTEs | Near-identical syntax; Postgres CTEs are faster |
  | NetworkX in-memory | Up to ~100K nodes | Beyond that, switch to igraph or a graph DB |
  | 3-way RRF fusion | Perfectly | Architecture is backend-agnostic |
  | Text embeddings (fastembed) | Switch to hosted embedding API | Same vector format, different compute |
  | TransE/RotatE (if adopted) | Scales well | But still needs graph density |
  | GNN (if adopted) | Needs GPU for large graphs | Significant infrastructure change |
  
  The recommended approach (SQL CTEs + 3-way RRF) scales cleanly to hosted deployment. The SQL migrates to Postgres, the embeddings can move to a hosted service, and the RRF fusion logic is pure Python with no infrastructure dependencies.
  
  ---
  
  ## 7. Concrete Recommendations
  
  ### Phase 1: SQL-Based Graph Expansion (Implement Now)
  
  **What:** Add a graph traversal channel to the existing RRF fusion pipeline.
  
  **Changes required:**
  1. In `search_backends.py`, add a `graph_expand()` function using recursive CTEs on the existing `relations` table
  2. Extend `HybridBackend.search()` to run graph expansion on the top-5 RRF results
  3. Extend `_rrf_fuse()` to accept a third ranked list (or make it accept N lists)
  4. Add relation type filtering (expand `broader`, `narrower`, `references`, `related`; skip `supersedes` and `wasDerivedFrom` for retrieval)
  
  **Dependencies:** None. Uses existing SQLite database and relations table.
  
  **Estimated effort:** ~50-80 lines of Python. Single session.
  
  **Expected impact:** Modest improvement on queries where the best answer is structurally adjacent to a text match. More importantly, this establishes the architecture for richer graph features later.
  
  ### Phase 2: Relation Density Improvement (Prerequisite for Further Graph Work)
  
  Before investing in more sophisticated graph methods, the graph needs to be denser. Currently, relation extraction is opportunistic — the LLM may or may not produce relations during beat extraction.
  
  **Options to increase density:**
  - **Embedding-based relation suggestion:** After indexing a new note, find the top-3 most similar notes by embedding distance. Suggest `related` links for those above a similarity threshold. This bootstraps graph connectivity from text similarity — the graph then adds typed traversal on top.
  - **Batch relation enrichment:** Add a mode to `cb_enrich` that proposes relations between existing notes in a folder, using the LLM to evaluate pairs.
  - **Explicit prompting:** Update the extraction prompt to more aggressively produce `broader`/`narrower` relations by including the vault's folder structure as context.
  
  **Recommendation:** Start with embedding-based relation suggestion. It's automatic, requires no LLM call, and uses infrastructure that already exists (the usearch index). Set a similarity threshold (e.g., cosine distance < 0.3) and auto-suggest `related` links.
  
  ### Phase 3: NetworkX for Advanced Graph Features (If Needed)
  
  **What:** Load the relations table into a NetworkX DiGraph at MCP server startup. Use it for:
  - Connected component analysis (find isolated note clusters)
  - PageRank-weighted search (boost notes that are referenced by many other notes)
  - Community detection (group related notes for restructuring)
  
  **When:** Only if Phase 1 demonstrates that graph signal improves retrieval quality and users request graph-aware features beyond simple traversal.
  
  **Dependencies:** `networkx` (~3MB pip install).
  
  ### What NOT to Do
  
  - **Do not adopt TransE, RotatE, or any knowledge graph embedding model.** The vault graph is too sparse. These methods need 10K+ triples to produce useful embeddings.
  - **Do not adopt GNNs (GCN, GraphSAGE).** The PyTorch dependency is massive, the quality improvement at this scale is negligible, and the text embeddings already capture the semantic signal.
  - **Do not adopt a graph database (Neo4j, Kuzu, DuckPGQ).** SQLite recursive CTEs handle everything needed for retrieval-oriented traversal. A graph database adds operational complexity with no quality benefit at this scale.
  - **Do not invest in graph methods before improving relation density.** The bottleneck is not the algorithm — it's the data. A sparse graph will produce poor results regardless of how sophisticated the traversal method is.
  
  ---
  
  ## 8. Assessment of Current Relation Encoding
  
  ### Frontmatter `related:` wikilinks
  
  ```yaml
  related:
    - "[[Some Other Note]]"
    - "[[Another Note]]"
  ```
  
  **Assessment:** Adequate for untyped associations. The wikilink format is Obsidian-native, which is good for vault navigation. However, it carries no type information — all links are implicitly `related`.
  
  ### Body `## Relations` section
  
  ```markdown
  ## Relations
  - broader:: [[Parent Topic]]
  - references:: [[Source Note]]
  ```
  
  **Assessment:** This is where typed relations live. The `predicate:: [[target]]` format is Dataview-compatible, which is a strength. The current predicates (`related`, `references`, `broader`, `narrower`, `supersedes`, `wasDerivedFrom`) are grounded in SKOS/Dublin Core/PROV-O — a solid foundation.
  
  ### Is This Sufficient Substrate?
  
  **Yes, with one caveat.** The encoding is sufficient for typed traversal. The relations table in SQLite already parses and stores these relations. The caveat is **bidirectionality**: the current `relations` table stores directed edges (from_id -> to_title), but some relations are inherently bidirectional (`related`) and some are inverse pairs (`broader`/`narrower`). The traversal CTE should handle both directions:
  
  ```sql
  -- Bidirectional traversal
  SELECT to_title AS neighbor FROM relations WHERE from_id = ?
  UNION
  SELECT from_id AS neighbor FROM relations WHERE to_title = ?
  ```
  
  And for inverse pairs, the traversal should follow `broader` in the reverse direction when expanding "narrower" and vice versa.
  
  **No schema changes needed.** The current encoding captures everything required for Phase 1 graph expansion. If relation density improves (Phase 2), the same schema handles it.
  
