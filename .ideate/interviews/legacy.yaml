entries:
  - {id: IQ-legacy-001, question: Do the existing guiding principles still apply?, answer: Yes, with no changes needed. The user confirmed all principles still hold., domain: null, seq: 1}
  - {id: IQ-legacy-002, question: "The cycle 002 review found critical bugs: install.sh references deleted directories, and vault.py/search_backends.py/evaluate.py have bare imports that fail in packaged installs. Should these be addressed first?", answer: Yes — critical bugs take priority. All three should be fixed before any new feature work begins. They block users from installing and running the package., domain: null, seq: 2}
  - {id: IQ-legacy-003, question: You mentioned wanting to reshape the MCP tools for intake and retrieval. What problems are you seeing with cb_extract and cb_file?, answer: "cb_extract is for session extraction (extracting beats from a Claude conversation transcript). cb_file is for manually capturing a specific insight or note. But there's a third use case: I sometimes have Claude generate a research report or findings document as a standalone artifact, and I want to file that whole document into the vault — not just extract beats from a conversation about it. That \"document intake\" mode doesn't fit cleanly into either existing tool.", domain: null, seq: 3}
  - {id: IQ-legacy-004, question: And for retrieval — what's the issue with cb_recall and cb_read?, answer: cb_recall does search (semantic/keyword) and returns matching notes. cb_read reads a specific note by path. The problem is that cb_recall can also synthesize context from multiple results, and cb_read can also be used for checking what's already in a folder. There's redundancy and unclear purpose separation. I want cleaner, non-redundant interfaces., domain: null, seq: 4}
  - {id: IQ-legacy-005, question: Should we add new tools for these use cases, or redesign the existing ones?, answer: Redesign. Adding interfaces alone is not good — we should remove redundancies. The tool count must not increase relative to what is removed. If we add document intake mode, something else needs to go or be merged., domain: null, seq: 5}
  - {id: IQ-legacy-006, question: On filing accuracy — what's broken?, answer: Two things. First, the clustering algorithm in cb_restructure sometimes produces bad clusters that don't reflect semantic relationships. Second, when autofile routes a beat to a folder, I'd like to know how confident it is. If confidence is low, I want the option to either let it go to the inbox or to ask me before filing., domain: null, seq: 6}
  - {id: IQ-legacy-007, question: "For the uncertainty handling — should \"ask me\" mean a prompt at filing time, or a config flag?", answer: A config flag. I don't want to be interrupted every time there's a low-confidence filing. Set a config key like `uncertain_filing_behavior` with values `ask` or `inbox`, and apply it at filing time., domain: null, seq: 7}
  - {id: IQ-legacy-008, question: Should confidence scoring apply per-beat or per-session?, answer: Per-beat. Each beat might route differently — one might be highly certain (project-specific technical detail), another uncertain (general insight that could go anywhere)., domain: null, seq: 8}
  - {id: IQ-legacy-009, question: On automatic indexing — what's the gap?, answer: When beats are written to the vault, they're indexed. But if I edit notes manually in Obsidian, add files, or move things around, the search index gets stale. I'd like the index to stay current without manual `cb_reindex` calls., domain: null, seq: 9}
  - {id: IQ-legacy-010, question: Should this be triggered by file system events, a scheduled job, or something else?, answer: I don't know — that's worth researching first. I'd prefer a lightweight approach that doesn't require a persistent daemon. If cron or a Claude Code hook can cover it, that's better than a file watcher., domain: null, seq: 10}
  - {id: IQ-legacy-011, question: Should we update the vault CLAUDE.md schema to reflect the new tool names and capabilities after all this is implemented?, answer: Yes, and regenerate the current vault's CLAUDE.md from the updated schema. But I want to review the proposed changes before anything is written to the live vault., domain: null, seq: 11}
  - {id: IQ-legacy-012, question: Any ordering constraints? Which items are blockers for others?, answer: The critical bug fixes (install.sh, bare imports) should go first but don't block design work. The design proposals for intake and retrieval (040, 041) should be presented to me before any implementation starts. The vault CLAUDE.md update (047) comes last and requires approval before writing., domain: null, seq: 12}
  - {id: IQ-legacy-013, question: Any execution preferences — sequential vs parallel, model choices?, answer: "Parallel where possible, max 4 concurrent agents. Research and design work can use opus. Implementation uses sonnet. I only need to be consulted at the two pause points: design review for WI-040/041, and before WI-047 writes to the live vault. All other decisions are unilateral.", domain: null, seq: 13}
  - {id: IQ-legacy-014, question: Do the existing guiding principles still apply?, answer: Yes, confirmed unchanged (same session as cycle 10)., domain: null, seq: 14}
  - {id: IQ-legacy-015, question: What do you want this next cycle to focus on?, answer: Take care of the deferred tasks from cycle 10., domain: null, seq: 15}
  - {id: IQ-legacy-016, question: Priority and approach for the deferred items?, answer: Start with light touch quick wins first before moving on to heavier tasks. For the sys.modules cleanup (10 test files), a lighter-touch approach is acceptable — consolidate patterns, add documentation, reduce fragility without full rewrites., domain: null, seq: 16}
  - {id: IQ-legacy-017, question: What do you want this cycle to focus on?, answer: "Handle the minor items. Remove the FastMCP pattern migration — it's a non-issue.

**Decisions:**
- FastMCP migration: dismissed (non-issue, current pattern works)
- CI/CD: deferred (infrastructure decision, not a code change)
- ruff ignore list: no action (documented, acceptable breadth)
- All other minor items: address now", domain: null, seq: 17}
  - {id: IQ-legacy-018, question: Review findings exist from cycle 014. Are you here to address those findings, to make other changes, or both?, answer: Address findings as well as focusing on technical debt., domain: null, seq: 18}
  - {id: IQ-legacy-019, question: Which items have obvious solutions vs need design decisions?, answer: "Fix everything with an obvious solution first, come back to the rest later. Use best judgment, adhere to all rules and principles.

**Items triaged as obvious fixes:**
- autofile.py bare import (line 469): `from search_index` → `from cyberbrain.extractors.search_index` — silent bug, autofile notes never indexed
- search_backends.py dead branch (line 862): `or True` makes GrepBackend unreachable
- Stale build artifacts: build.sh (deprecated), dist/ (stale 0.1.0 wheel), orphaned requirements.txt files
- README: stale paths, Python 3.8+ requirement, install.sh-first installation instructions
- evaluate.py bare import (Q-8): already fixed, removed from scope

**Items deferred (require design decisions):**
- Relation vocabulary mismatch (capture Q-3)
- Search backend cache invalidation (retrieval Q-2)
- Hook/MCP extraction path divergence (capture Q-2)
- Proactive recall validation (retrieval Q-1)
- Manual capture mode re-test (capture Q-1)
- --affected-only correctness (distribution Q-10)
- CI/CD pipeline (distribution Q-11)

**Items accepted as-is (per cycle 014):**
- Dynamic Path.home() references (intentional)
- ruff ignore list breadth (acceptable)
- No formal changelog (journal.md serves)

**Decisions:**
- All principles unchanged
- Architecture unchanged
- Scope limited to obvious fixes only", domain: null, seq: 19}
  - {id: IQ-legacy-020, question: Which deferred items do you want to address?, answer: All of the documentation-related minor findings., domain: null, seq: 20}
  - {id: IQ-legacy-021, question: For ARCHITECTURE.md — should it be updated comprehensively or deprecated in favor of specs/plan/architecture.md?, answer: It should match reality. No deprecation for top-level architecture documentation; it is designed for human-centric review where specs are a record of decisions., domain: null, seq: 21}
  - {id: IQ-legacy-022, question: Anything else documentation-related to bundle in?, answer: "This is the full scope.

**Items in scope:**
