- Architecture unchanged
- ARCHITECTURE.md is the human-facing overview; specs/plan/architecture.md is the decision record — both maintained", domain: null, seq: 22}
  - {id: IQ-legacy-023, question: Which items do you want to address?, answer: All of them except CI/CD (item 10) and skip proactive recall / manual capture mode validation (items 7 & 8)., domain: null, seq: 23}
  - {id: IQ-legacy-024, question: Relation vocabulary — which is more useful for a knowledge graph like this?, answer: "Need to determine which is the more useful vocabulary. [Research spawned]
Research recommended merged 7-predicate set: related, references, causes, caused-by, supersedes, implements, contradicts.
A: Let's do it.", domain: null, seq: 24}
  - {id: IQ-legacy-025, question: Search backend cache invalidation — invalidate on config write (a) or TTL-based (b)?, answer: Option a is fine., domain: null, seq: 25}
  - {id: IQ-legacy-026, question: Hook/MCP extraction path divergence — refactor to shared function (a) or document and leave (b)?, answer: "Option a.

**Investigation: --affected-only correctness**
Result: Critical bug — _extract_imports() only handles ast.ImportFrom, ignores plain import X. ~30% of import relationships missed. Tests silently skipped.

**Items in scope:**
- Recreate CyberbrainConfig TypedDict (lost during brrr cycle)
- Clean up install.sh/uninstall.sh references in README
- Fix ARCHITECTURE.md prompt count
- Migrate relation vocabulary to merged 7-predicate set
- Add search backend cache invalidation on cb_configure
- Refactor cb_extract to share orchestration with main()
- Fix --affected-only import detection bug

**Decisions:**
- Relation vocabulary: merged 7-predicate set (research-backed)
- Search cache: invalidate on config write
- Extraction path: shared orchestration function
- All principles unchanged", domain: null, seq: 26}
  - {id: IQ-legacy-027, question: Address all remaining items?, answer: "Yes, do a refine cycle to address all remaining items.

