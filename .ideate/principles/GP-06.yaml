id: GP-06
type: guiding_principle
name: Lean Architecture, Heavy on Quality
status: active
description: "Prefer minimal dependencies and simple infrastructure. SQLite over Postgres. Flat files over daemons. Precomputed vectors over real-time inference servers. But never sacrifice output quality for architectural simplicity — if a heavier component demonstrably improves results, it earns its place. The bar is: does this make the user think better?"
