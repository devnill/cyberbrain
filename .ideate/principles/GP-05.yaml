id: GP-05
type: guiding_principle
name: Vault-Adaptive, Not Vault-Prescriptive
status: active
description: The system observes and works with the vault structure that already exists rather than imposing its own. The vault's CLAUDE.md is the single source of truth for types, tags, folders, and conventions. The system works whether the vault uses PARA, Zettelkasten, Johnny Decimal, or something idiosyncratic.
