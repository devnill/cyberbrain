id: GP-13
type: guiding_principle
name: Works Everywhere the User Works
status: active
description: Claude Code is the primary interface, but Claude Desktop and mobile are equally important. Knowledge should be capturable from any interface and retrievable from any interface. Automatic invocation (proactive recall) should work without the user knowing which tools exist or how they're named.
