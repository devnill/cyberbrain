name: Feels Like Memory, Not a Filing Cabinet
status: active
description: "The experience goal is extended cognition — using this feels like having an excellent memory, not like managing a system. The interaction model, recall UX, and how beats are surfaced should feel like remembering, not searching a database. This applies especially to automatic invocation: the system should surface relevant knowledge without being asked."
