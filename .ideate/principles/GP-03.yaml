id: GP-03
type: guiding_principle
name: High Signal-to-Noise Above All
status: active
description: What gets captured, curated, and injected into context must be directly useful. Irrelevant or diluted content is worse than nothing — it consumes context tokens and can mislead the LLM. A vault full of noise is worse than a small vault with high-quality signal. This applies to extraction (don't capture noise), curation (merge/split to improve discoverability), and retrieval (inject only what's relevant).
