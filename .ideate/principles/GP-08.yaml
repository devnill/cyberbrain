id: GP-08
type: guiding_principle
name: Graceful Degradation Over Hard Failure
status: active
description: Optional infrastructure (semantic index, embedding model, ruamel.yaml) enhances the system when present but never blocks it when absent. Missing features degrade to simpler alternatives (grep fallback, empty relations, no synthesis). Hooks always exit 0. Non-fatal errors are logged, not raised.
