id: GP-11
type: guiding_principle
name: Curation Quality is Paramount
status: active
description: Notes must be highly discoverable as the vault grows. Restructuring, merging, splitting, hub creation, and clustering must produce results that are near perfect — a bad merge or false grouping actively harms the vault. When quality can't be guaranteed automatically, surface the decision to the user rather than proceeding with a bad result.
