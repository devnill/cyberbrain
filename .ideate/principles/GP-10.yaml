id: GP-10
type: guiding_principle
name: YAGNI Discipline
status: active
description: Don't add what isn't needed. Don't design for hypothetical future requirements. The right amount of complexity is the minimum needed for the current task. Features earn their way in through demonstrated need, not anticipated need.
