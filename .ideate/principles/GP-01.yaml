id: GP-01
type: guiding_principle
name: Zero Ceremony for the Common Case
status: active
description: Automatic capture requires no user action after initial setup. Manual filing requires minimal input. The system does the classification work. This extends to all curation operations — extraction, filing, enrichment, restructuring, and working memory review should default to automatic behavior that produces good results without user intervention.
