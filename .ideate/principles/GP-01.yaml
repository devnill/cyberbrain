id: GP-01
type: guiding_principle
title: Low friction setup
description: A new user must go from plugin install to working extraction in under two minutes with no prior knowledge of cyberbrain, Obsidian, or PKMS concepts. Every failure state must surface an actionable next step — never fail silently. Configuration should be guided, not manual.
rationale: First real-world user test revealed that the current setup requires too much prior knowledge and fails silently when prerequisites are missing. Users abandon tools that don't work on first try.
