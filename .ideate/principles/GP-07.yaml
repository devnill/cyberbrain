id: GP-07
type: guiding_principle
name: Cheap Models Where Possible, Quality Models Where Necessary
status: active
description: Use the cheapest model that produces acceptable output for each task. Classification, routing, and metadata enrichment are cheap-model tasks. Content generation (merging notes, writing hub pages, synthesis) may need stronger models. Model selection should be per-task, not global, once the quality data supports it.
