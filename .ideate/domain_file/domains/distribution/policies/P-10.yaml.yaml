  title: C-06 exempts metadata file writes
  summary: >
    C-06 (all vault writes through Python abstraction) applies to knowledge note
    writes where paths may be LLM-influenced. Metadata file writes to known fixed
    paths (vault CLAUDE.md in manage.py and setup.py) are exempt. The vault write
    abstraction (write_vault_note/update_vault_note/move_vault_note) provides
    path-traversal protection that is unnecessary for hardcoded paths.
