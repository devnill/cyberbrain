content: |-
  id: P-05
  domain: retrieval
  status: active
  title: Transcript noise filtering before extraction
  summary: >
    The transcript parser strips skill prompts, command messages, task notifications,
    system reminders, and usage blocks before feeding text to the extraction LLM.
    This prevents ephemeral system content from consuming the truncation budget and
    diluting the extraction signal. When new tooling injects large blocks into
    conversations, corresponding filter patterns must be added to transcript.py.
  source: Full audit session 2026-03-27 — 65% of an ideate:refine session was skill prompts.
