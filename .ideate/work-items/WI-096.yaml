  ## Implementation Notes

  ### Five write sites to migrate

  1. **Line 61**: `src_path.rename(dest_path)` (move-cluster) → `move_vault_note(src_path, dest_path, str(vault))`
  2. **Line 111**: `output_path.write_text(merged_content)` (merge) → `write_vault_note(output_path, merged_content, str(vault))`
  3. **Line 164**: `output_path.write_text(hub_content)` (hub-spoke) → `write_vault_note(output_path, hub_content, str(vault))`
  4. **Line 207**: `src_path.rename(dest)` (subfolder move) → `move_vault_note(src_path, dest, str(vault))`
  5. **Line 230**: `hub_out.write_text(hub_content)` (subfolder hub) → `write_vault_note(hub_out, hub_content, str(vault))`

  ### Error handling
  Replace inline `_is_within_vault()` boolean checks + continue with try/except ValueError around vault write calls. Append same skip messages to result_lines in the except block.

  ### Import changes
  Replace `_is_within_vault` import with `write_vault_note, move_vault_note` from shared.
  Keep `_move_to_trash` — already the approved delete path.
