notes: |-
  Add a function to shared.py like:

  def require_config(cwd: str = '') -> dict:
      '''Load config or raise ToolError if not configured.'''
      # Try loading config, catch failures, raise ToolError with actionable message

  Then replace _load_config() calls in each tool with require_config(). The existing _load_config() stays for cb_configure and cb_status which handle missing config gracefully.

  The current _load_config in shared.py calls resolve_config which calls load_global_config. Check the actual error path in MCP context before implementing.
