notes: |-
  ## Implementation Notes

  ### extract_beats.py dead code
  In main(), the --beats-json path at ~line 293 calls sys.exit(0) if session already extracted. Then run_extraction() is called at ~line 305. The result["skipped"] check at lines 308-312 is unreachable because the dedup guard already exited. Remove lines 308-312.

  ### review.py redundant pre-check
  Line 422: `if not _is_within_vault(vault, output_path):` is a pre-check before `write_vault_note()` at line 437. Since write_vault_note() calls _is_within_vault_check() internally, this pre-check is redundant. Remove the if block (lines 422-426). The write_vault_note call will raise ValueError if the path is outside the vault — wrap it in try/except ValueError and append the same skip message.

  Also remove `_is_within_vault` from the import block (line 16) if no other uses remain in the file.
