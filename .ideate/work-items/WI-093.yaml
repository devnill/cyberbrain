  ## Implementation Notes

  ### state.py lazy paths
  Convert all module-level constants to functions:
  ```python
  def _base() -> Path:
      return Path.home() / ".claude" / "cyberbrain"

  def config_path() -> Path:
      return _base() / "config.json"
  ```
  All constants become snake_case functions: CONFIG_PATH -> config_path(), SEARCH_DB_PATH -> search_db_path(), etc.
  Update all 12 import sites to call the function at use site.

  ### basedpyright fixes
  1. shared.py:90 — _load_config() return type: annotate as CyberbrainConfig or use a cast
  2. evaluate.py:465 — widen parameter type or cast

  ### Architecture tensions
