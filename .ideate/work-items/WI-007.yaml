notes: |-
  Add a uv availability guard to each hook, early in execution before any uv run call.

  Pattern:
  ```bash
  if ! command -v uv >/dev/null 2>&1; then
    echo "cyberbrain: uv not found. Install via: brew install uv" >&2
    exit 0
  fi
  ```

  For session-end-extract.sh and session-end-reindex.sh, the message should go to their respective log files (same pattern as the existing config pre-flight check).

  For pre-compact-extract.sh, the message goes to stderr (same as existing error messages in that hook).

  The check should run BEFORE the CLAUDE_PLUGIN_ROOT branch, since uv is needed in both plugin and non-plugin modes. Check mcp/start.sh for the existing uv-finding logic as a reference — it searches common locations. For hooks, a simple command -v uv is sufficient since the hook runs in the user's shell environment.
