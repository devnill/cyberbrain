domain: extraction
notes: |-
  ## Implementation Notes

  ### run_extraction() config fix
  Line 68 currently: `cfg: dict = resolve_config(cwd)`
  Change to: `cfg: dict = config if config is not None else resolve_config(cwd)`

  ### Merge _write_beats_and_log()
  Add `beats=None` parameter to `run_extraction()`. When beats is provided, skip the LLM extraction step (lines 84-86) and use the provided beats directly. The transcript_text param can be None when beats are pre-provided. This eliminates `_write_beats_and_log()` (lines 398-488) which duplicates the beat-writing loop.

  The --beats-json CLI path (line 289) changes from:
  ```python
  _write_beats_and_log(beats, session_id, args.trigger, args.cwd, config, llm_duration=0.0)
  ```
  to:
  ```python
  run_extraction(None, session_id, args.trigger, args.cwd, config=config, beats=beats)
  ```
