notes: |-
  ## Implementation approach

  Add tests to `tests/test_autofile.py` following the existing patterns:
  - Mock `call_model` to return controlled autofile JSON decisions
  - Use `temp_vault` / `temp_home` fixtures for filesystem isolation
  - Verify file content on disk matches expectations

  ## Test cases

  1. **document_intake_create_preserves_content**: Call `autofile_beat` with `source="document-intake"`, mock LLM returns `{"action": "create", "path": "Projects/test/note.md", "content": "rewritten content", "confidence": 0.9}`. Assert the written file contains the original `beat["body"]`, not "rewritten content".

  2. **document_intake_extend_creates_new_note**: Call `autofile_beat` with `source="document-intake"`, mock LLM returns `{"action": "extend", "target_path": "existing.md", "insertion": "rewritten", "confidence": 0.9}`. Assert a new file is created (not appended to existing.md) with original content.

  3. **single_beat_capture_create_uses_llm_content**: Call `autofile_beat` with `source="manual-filing"`, mock LLM returns create action. Assert the written file uses LLM-generated content (existing behavior).

  ## Key files
  - `tests/test_autofile.py` — existing autofile test module (~1,497 lines)
  - `tests/conftest.py` — shared fixtures
