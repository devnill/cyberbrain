criteria:
  - cb_configure accepts create_vault parameter (path string) that creates directory structure at the specified path
  - cb_configure accepts template parameter (para|flat|developer) that determines which folders to create
  - "PARA template creates: Projects/, Areas/, Resources/, Archives/, AI/Claude-Sessions/, AI/Working Memory/"
  - "Flat template creates: AI/Claude-Sessions/, AI/Working Memory/"
  - "Developer template creates: Projects/, AI/Claude-Sessions/, AI/Working Memory/"
  - All templates create the vault root directory if it doesn't exist
  - After creating dirs, writes config.json with vault_path, inbox (AI/Claude-Sessions), and working_memory_folder (AI/Working Memory)
  - Returns confirmation listing created directories and config path
  - Refuses to overwrite existing vault (directory exists and is non-empty) unless force=True
  - "Follows Obsidian idioms: no .obsidian dir created, folder names are human-readable"
  - Existing cb_configure functionality (discover, vault_path, set/show config) is preserved unchanged
  - All existing tests pass; new tests cover create_vault with each template
domain: onboarding
