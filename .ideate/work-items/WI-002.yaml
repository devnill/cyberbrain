notes: |-
  Modify the cb_configure tool registration in manage.py to add create_vault and template parameters.

  The create_vault flow:
  1. Validate path doesn't already contain files (unless force=True)
  2. Create directory structure based on template
  3. Write global config to ~/.claude/cyberbrain/config.json
  4. Return success message with created paths

  Template definitions can be a simple dict in manage.py — no need for external template files.

  Existing functionality to preserve:
  - discover mode (find existing vaults)
  - vault_path setter
  - show_prefs/set_prefs/reset_prefs
  - All existing parameters and return formats

  Config fields to set on vault creation:
  - vault_path: the created path
  - inbox: 'AI/Claude-Sessions'
  - working_memory_folder: 'AI/Working Memory'
  - backend: 'claude-code' (default)
  - model: 'claude-haiku-4-5' (default)
