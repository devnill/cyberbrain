notes: |-
  Three fixes in manage.py + one in reindex.py:

  1. cb_configure no-args path (manage.py ~line 580): Wrap _load_config() call in try/except for ConfigError (imported from cyberbrain.extractors.config). On ConfigError, construct a minimal response showing vault as '(not configured)' with guidance to run /cyberbrain:config. The existing code at line 584 already handles vault_path='(not set)' — the fix prevents the exception from propagating before reaching that logic.

  2. cb_status (manage.py): Same pattern — wrap _load_config() in try/except ConfigError, return a structured 'not configured' response with guidance.

  3. _read_prefs_section (manage.py ~line 100): Replace __import__('re').finditer(...) with a local import re and re.finditer(...).

  4. reindex.py: Remove unused Path import (line 3) and unused ToolError import (line 7) if they are no longer referenced after the redundant vault checks were removed in WI-003.
