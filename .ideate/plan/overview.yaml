id: overview
type: overview
title: "Bug Fix: cb_file document intake content preservation"
body: |-
  ## What is changing and why

  The `autofile_beat` function in `autofile.py` rewrites note content via LLM even when `cb_file` is in document intake mode (title provided). This is a bug — document intake should preserve content verbatim, using the autofile LLM only for routing decisions (path selection).

  ## Trigger

  User filed a vision analysis document via `cb_file(title=..., content=...)`. The stored note content did not match the original input — the autofile LLM had rewritten it.

  ## Scope boundary

  - **Changing**: `autofile_beat` in `autofile.py` — add source-aware branching for document intake in both `create` and `extend` actions. Test coverage for document intake + autofile.
  - **Not changing**: Single-beat capture mode, autofile prompts, `write_beat` in `vault.py`, `cb_file` tool registration in `file.py`.

  ## Expected impact

  Minimal. The fix adds a conditional branch in `autofile_beat` for `source == 'document-intake'`. No changes to the autofile LLM contract or prompt. No changes to the write path.

  ## New work items

  WI-013: Fix autofile content preservation for document intake
  WI-014: Test coverage for document intake + autofile
