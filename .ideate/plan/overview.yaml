title: Cycle 23 — Full Audit Fixes + Transcript Noise Filtering
content: |-
  ## Summary

  Full audit of the codebase (v1.1.1) identified 6 significant and 18 minor findings across code quality, constraint enforcement, and documentation. All significant findings were fixed. A subsequent investigation into missing beat captures revealed transcript noise from skill prompts consuming 65% of extraction input. Noise filtering was added to the transcript parser.

  ## Changes Shipped

  ### v1.1.2 — Beat/entity type vocabulary split
  - Beat types (decision/insight/problem/reference) separated from entity types (project/note/resource/archived)
  - Domain tag inference from vault folder paths
  - Updated relation predicates
  - CyberbrainConfig TypedDict

  ### v1.1.3 — Full audit fixes
  - YAML frontmatter safety (json.dumps all string fields)
  - SQLite connection leak + LIKE wildcard escape in recall.py
  - Search backend cache invalidation on vault_path change
  - Incremental reindex metadata loss fix
  - C-06 vault write abstraction enforcement (6 remaining bypasses)
  - Lazy import, move_vault_note overwrite guard, config path centralization
  - Documentation: undocumented hooks, prompts, resources; stale install.sh references

  ### v1.1.3+ (uncommitted) — Transcript noise filtering
  - transcript.py filters skill prompts, command messages, task notifications, system reminders, usage blocks
  - MAX_TRANSCRIPT_CHARS raised from 150K to 190K
  - 3 new tests for filtering

  ## Deferred Items
  - GP-09: MCP dry_run for cb_extract/cb_file (needs design)
  - Q-11: No CI/CD pipeline (accepted risk)
  - TOCTOU dedup race (theoretical, single-user)

  ## Test Suite
  1336 passed, 16 skipped, 4 warnings
