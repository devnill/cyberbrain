id: module_spec-vault
type: module_spec
name: Vault
scope: |
  All vault I/O operations: writing beats as markdown files, routing beats to the correct folder, resolving relations against existing vault notes, generating filenames, validating beat types, reading vault CLAUDE.md, and searching the vault via grep. Also includes autofile (LLM-driven filing decisions) and run log (deduplication + structured logging + journal).
  
  NOT responsible for: LLM extraction logic (extraction module), search index management (search module), MCP tool orchestration (mcp-tools module).
provides:
  - "### From `vault.py`:"
  - `write_beat(beat, config, session_id, cwd, now, vault_titles=None, source="hook-extraction") -> Path` — Writes a single beat as a markdown file. Routes by durability (working-memory vs durable) and scope (project vs general). Resolves relations. Updates search index post-write.
  - `resolve_output_dir(beat, config) -> Path | None` — Routes a beat to the correct vault folder. Returns None if inbox not configured.
  - "`make_filename(title: str) -> str` — Converts title to clean filename. Strips `#[]^` and other invalid chars. Truncates at 80 chars."
  - `resolve_relations(raw_relations, vault_titles) -> list[dict]` — Validates relation targets against vault title set. Normalizes predicates to `VALID_PREDICATES`. Drops unresolved targets.
  - `build_vault_titles_set(vault_path) -> set` — Scans vault for all `.md` file stems.
  - `read_vault_claude_md(vault_path) -> str | None` — Reads `CLAUDE.md` from vault root.
  - `get_valid_types(config) -> set` — Returns valid beat types from vault CLAUDE.md or defaults.
  - `parse_valid_types_from_claude_md(text) -> set` — Extracts type vocabulary from CLAUDE.md text.
  - `search_vault(beat, vault_path, max_results=5) -> list[str]` — Grep-based vault search by tags + title keywords. Returns ranked file paths.
  - `inject_provenance(content, source, session_id, now, extra_fields=None) -> str` — Injects `cb_source`, `cb_created`, `cb_session` into YAML frontmatter.
  - `_is_within_vault(vault, target) -> bool` — Path traversal guard.
  - `_DEFAULT_VALID_TYPES` — `{"decision", "insight", "problem", "reference"}`
  - `VALID_PREDICATES` — `{"related", "references", "broader", "narrower", "supersedes", "wasDerivedFrom"}`
  - "### From `autofile.py`:"
  - `autofile_beat(beat, config, session_id, cwd, now, vault_context=None, source="hook-extraction") -> Path | None` — LLM-driven filing. Calls `search_vault()` for context, sends beat + context to LLM, executes `create` or `extend` action. Falls back to `write_beat()` on any failure.
  - "`_merge_relations_into_note(note_path, new_relations)` — Merges new relations into existing note's `related:` frontmatter using `ruamel.yaml` for round-trip rewriting."
  - "### From `run_log.py`:"
  - `is_session_already_extracted(session_id) -> bool` — Deduplication check against `cb-extract.log`.
  - `write_extract_log_entry(session_id, beat_count)` — Appends to dedup log.
  - "`write_runs_log_entry(entry: dict)` — Appends JSON to structured runs log."
  - `write_journal_entry(written_paths, config, session_id, project_name, now)` — Creates/appends daily journal entry with wikilinks.
  - `RUNS_LOG_PATH` — `~/.claude/cyberbrain/logs/cb-runs.jsonl`
  - "### From `analyze_vault.py`:"
  - "`analyze_vault(vault_path, max_samples=3) -> dict` — Produces JSON report of vault structure: directories, frontmatter fields, tags, wikilinks, entity types, naming conventions, orphan notes."
requires:
  - "`call_model(system_prompt, user_message, config)` (from: backends) — Used by autofile for filing decisions"
  - "`load_prompt(filename)` (from: config) — Autofile prompt loading"
  - "`parse_frontmatter(content)`, `read_frontmatter_tags(path)` (from: extraction/frontmatter) — Used by autofile for collision detection"
  - "`update_search_index(note_path, metadata, config)` (from: search) — Post-write index update (imported lazily, non-fatal on ImportError)"
  - "`GLOBAL_CONFIG_PATH` (from: config) — Used in error messages"
boundary_rules:
  - All beat writes validate the output path stays within the vault (`_is_within_vault`).
  - "Filename collision: `write_beat()` appends a numeric prefix (`2 Title.md`, `3 Title.md`). Autofile `create` resolves collisions by either extending (if tag overlap >= 2) or appending a distinguishing tag."
  - `resolve_relations()` drops targets not found in `vault_titles` — no phantom nodes. Unknown predicates normalize to `"related"`.
  - `search_vault()` uses subprocess grep (not the search index) for simplicity and zero dependency on index state.
  - Working-memory beats get extra frontmatter fields (`cb_ephemeral`, `cb_review_after`) via `_wm_frontmatter_fields()`.
  - Autofile falls back to `write_beat()` on any backend error, bad JSON, or path traversal.
  - `_merge_relations_into_note()` requires `ruamel.yaml` for round-trip YAML rewriting; degrades to no-op with warning if not installed.
  - Daily journal uses `journal_folder` and `journal_name` config keys with strftime templating.
  - "Dedup log format: tab-separated `timestamp\\tsession_id\\tbeat_count`."
