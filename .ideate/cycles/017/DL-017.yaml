  # Decision Log — Cycle 017
  
  ## DL1: Merged 7-predicate relation vocabulary adopted
  Replaced SKOS vocabulary (broader, narrower, wasDerivedFrom) with merged set: related, references, causes, caused-by, supersedes, implements, contradicts. Research-backed decision from specs/steering/research/relation-vocabulary.md.
  
  ## DL2: Search backend cache invalidated on config write
  cb_configure now calls _invalidate_search_backend() when search_backend or embedding_model changes. Resolves architecture tension T6.
  
  ## DL3: Shared extraction orchestration via run_extraction()
  cb_extract and main() now both call run_extraction(). Partially resolves T5 — the --beats-json CLI path still uses _write_beats_and_log() as a separate orchestration function.
  
  ## DL4: CyberbrainConfig TypedDict recreated
  32-field TypedDict in config.py. Lost during brrr cycle worker overwrite, now restored.
  
  ## DL5: --affected-only import detection fixed
  ast.Import handling added. ~30% of import relationships were previously missed.
  
  ## Open Questions
  - run_extraction() config parameter: use it or remove it?
  - _write_beats_and_log(): merge into run_extraction() or leave as separate path?
  - Architecture doc tensions T5/T6/T7: mark resolved
  - CLAUDE.md relation vocabulary section: update to new predicates
