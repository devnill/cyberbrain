  ## [refine] 2026-03-27 — Transcript noise filtering (v1.1.3+)


  ### Problem

  User reported beats not being captured despite plugin loading without errors.
  Investigation revealed:


  1. Hooks fire correctly, extractor runs, but long sessions with large context
  windows (1M Opus) never trigger PreCompact — so extraction only happens at
  SessionEnd.

  2. SessionEnd extraction ran but produced 0 beats on a 590K-char ideate:refine
  session.


  ### Root Cause

  The transcript parser (`transcript.py`) fed raw conversation text to the
  extraction LLM. In sessions using ideate skills, **65% of transcript content
  was skill prompt injections** — multi-thousand-char system instructions that
  are ephemeral and contain no durable knowledge. After 150K-char truncation,
  the LLM only saw skill prompts and YAML artifacts, missing the actual human
  conversation entirely.


  Breakdown of the 590K-char session:

  - Skill prompts: 383K (65%)

  - Human content: 158K (27%)

  - Assistant content: 44K (7%)

  - Command/system noise: 1.5K (<1%)


  ### Fix Applied


  **Transcript noise filtering** in `src/cyberbrain/extractors/transcript.py`:


  Blocks dropped entirely (matched by regex):

  - `Base directory for this skill:` — skill prompt injections

  - `<command-name>`, `<command-message>` — slash command invocations

  - `<local-command-caveat>`, `<local-command-stdout>` — local command output

  - `<task-notification>` — subagent task notifications with full results


  Tags stripped inline (content removed, surrounding text preserved):

  - `<system-reminder>...</system-reminder>` — task tool reminders, deferred
  tool lists

  - `<usage>...</usage>` — token usage blocks from subagent responses


  **Truncation limit raised** from 150K to 190K chars in `backends.py`. Safe
  because:

  - Haiku has 200K context; system+user prompts take ~10K

  - Noise filtering now removes the bulk before truncation applies


  **Result on the problematic session**: 590K → 49K chars (92% reduction). All
  remaining content is actual human-assistant conversation with extractable
  knowledge. Fits entirely within the 190K limit.


  ### Key Insight for Future Similar Issues

  When new tooling (skills, plugins, subagents) injects large blocks into the
  conversation transcript, those blocks dilute the extraction signal. The noise
  filter patterns in `transcript.py` may need updating as new injection patterns
  emerge. The diagnostic path is: check `cb-runs.jsonl` for 0-beat sessions with
  non-trivial duration, then compare raw transcript size vs parsed transcript
  size to identify noise ratio.


  ### Files Modified

  - `src/cyberbrain/extractors/transcript.py` — noise filtering (new:
  `_is_noise_block`, `_strip_inline_noise`, pattern lists)

  - `src/cyberbrain/extractors/backends.py` — `MAX_TRANSCRIPT_CHARS` 150K → 190K

  - `tests/test_extract_beats.py` — 3 new tests for filtering (skill prompts,
  command messages, system reminders)
