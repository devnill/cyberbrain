  ## Key Implementation Decisions
  
  ### Intake Interface (WI-042)
  **Decision**: Mode switch via `title` parameter presence/absence
  - Title omitted → UC2 extraction mode (LLM extracts title/type/tags)
  - Title provided → UC3 direct intake mode (uses provided values)
  
  **Rationale**: Simple, intuitive API that requires minimal user input for common case (extraction) while allowing full control when needed (direct intake).
  
  ### Retrieval Interface (WI-046)
  **Decision**: Pipe-separated identifiers for multi-note recall
  - Format: `"Note A|Note B|Note C"`
  - Up to 10 identifiers supported
  - Optional synthesis with `synthesize=True`
  
  **Rationale**: Natural language feel (like listing memories) while being parseable and supporting precise note selection.
  
  ### Test Infrastructure (WI-048 to WI-051)
  **Decision**: Minimal, focused implementations
  - AST-based dependency mapping (no external tools)
  - Two-pass test runner (quiet first, detailed on failure)
  - Pytest markers for selective test running
  
  **Rationale**: YAGNI discipline — minimal complexity that serves the need without over-engineering.
  
  ---
  
  ## Open Questions
  
  None. All questions from prior cycles have been resolved.
  
  ---
  
  ## Policy Implications
  
  No new policies required. Cycle 003 implementations follow existing patterns:
  - Vault as canonical store (Principle 2)
  - Zero ceremony for common case (Principle 1)
  - Graceful degradation (Principle 8)
  - YAGNI discipline (Principle 10)
  
  ---
  
  ## Technical Debt Notes
  
  None introduced in Cycle 003. All implementations are clean and focused.
  
  Existing technical debt (from architecture T1-T8) not affected by this cycle.
