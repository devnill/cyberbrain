findings: |-
  ## Critical Findings

  ### C1: cb_configure() no-args raises ConfigError on fresh install
  - File: src/cyberbrain/mcp/tools/manage.py:580
  - Issue: On fresh install (no config.json), cb_configure() calls _load_config() which calls resolve_config() -> load_global_config() which raises ConfigError. SKILL.md Phase 1 expects a normal response to branch on, not an exception.
  - Impact: The entire first-run detection flow in /cyberbrain:config is broken. GP-01 violated at the entry point.

  ## Significant Findings

  ### S1: SKILL.md error handler references non-existent cb_setup parameters
  - File: skills/config/SKILL.md:141
  - Issue: References cb_setup(phase=1) and cb_setup(phase=2) but cb_setup has no phase parameter.

  ## Minor Findings

  ### M1: working_memory_ttl type annotation mismatch
  - File: src/cyberbrain/extractors/config.py:50
  - Pre-existing. int declared, dict used at runtime.

  ## Principle Adherence
  - GP-01 upheld in hooks (actionable messages), require_config (4 checks with ToolError), config.py (ConfigError messages), create_vault (next steps in response).
  - GP-01 violated in cb_configure no-args path on fresh install and orient -> cb_status path.
