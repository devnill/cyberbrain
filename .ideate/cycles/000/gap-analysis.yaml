content: |-
  # Gap Analysis — Full Audit

  ## Verdict: Fail

  4 significant findings, 10 minor findings.

  ## Critical Findings

  None.

  ## Significant Findings

  ### S1: vault_path change does not invalidate search backend cache (MR1/EC1)
  - cb_configure invalidates _search_backend for search_backend and embedding_model changes but not vault_path changes.
  - Subsequent cb_recall searches query the old vault until MCP server restarts.
  - Trivial fix: add _invalidate_search_backend() call when vault_path changes in manage.py.
  - Relates to: Q-02, retrieval domain

  ### S2: Proactive recall validation gap (MR2)
  - No integration test or validation harness confirms orient prompt reliably triggers cb_recall in real sessions.
  - Q-01 remains open: 'haven't seen it work without prompting in Claude Desktop.'
  - Cannot be unit-tested; requires live session validation.
  - Relates to: Q-01, GP-04

  ### S3: incremental_refresh passes empty metadata to index_note (EC2)
  - search_index.py:185 calls backend.index_note(str(md_file), {}) with empty metadata dict.
  - FTS5Backend.index_note uses metadata.get() for fields, so re-indexed notes lose title/tags/summary in index.
  - Relates to: retrieval domain, search accuracy

  ### S4: QUICKSTART.md references non-existent install.sh, omits cb_reindex (MI3)
  - QUICKSTART.md line 8 instructs 'bash install.sh' which does not exist.
  - cb_reindex tool omitted from tools reference table.
  - User-facing documentation for primary install path must be accurate.
  - Relates to: distribution domain

  ## Minor Findings

  ### M1: status field in beat frontmatter dead branch (EC3)
  - vault.py:443: `status = "active" if durability == "durable" else "active"` — both branches identical.
  - Working-memory notes already distinguished by cb_ephemeral: true.

  ### M2: CyberbrainConfig TypedDict missing bedrock_region, claude_path, search_db_path (II1)
  - Referenced in code but absent from TypedDict. Violates stated contract.

  ### M3: scripts/import.py dead constant EXTRACTORS_DIR and stale docstring (II2)
  - References install.sh and deleted path.

  ### M4: shared.py/server.py error messages reference non-existent install.sh (II3)
  - Should reference uv sync or plugin install.

  ### M5: No CI/CD pipeline (MI1)
  - Q-11 still open. Pre-commit only local enforcement.

  ### M6: No config backup mechanism (MI2)
  - cb_configure overwrites config.json with no backup.

  ### M7: README.md wrong default for uncertain_filing_threshold (MI4)
  - Documents 0.7, code defaults to 0.5.

  ### M8: MCP cb_extract/cb_file lack dry_run parameter (IR1)
  - GP-09 states all destructive operations support dry-run. CLI supports it but MCP does not.

  ### M9: cb_reindex(rebuild=True) returns no note count (IR2)
  - No signal about how many notes were reindexed.

  ### M10: cb_review trash output doesn't mention recoverability (IR3)
  - Users may believe notes are permanently deleted. Should note .trash location.
