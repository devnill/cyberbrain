content: |-
  # Code Quality Review — Full Audit

  ## Verdict: Pass (with caveats)

  All 1333 tests pass (16 skipped, 4 warnings). No critical bugs found. Several significant code quality and correctness issues identified.

  ## Critical Findings

  None.

  ## Significant Findings

  ### S1: Unquoted YAML frontmatter fields in vault.py write_beat()
  - vault.py:447-463: `project_name`, `cwd`, `source`, `cb_source`, `entity_type`, `beat_type`, `scope`, `status` are interpolated into YAML frontmatter without `json.dumps()` quoting.
  - `title`, `summary`, `tags`, `related` correctly use `json.dumps()`.
  - A project name containing colons (e.g., 'My: Cool Project') generates invalid YAML: `project: My: Cool Project`.
  - `cwd` paths on Windows with backslashes are also problematic.
  - Risk: corrupted frontmatter on notes, breaking Obsidian parsing.
  - Relates to: C-03 (Obsidian-compatible markdown), data integrity

  ### S2: SQLite connection leak in _find_note_by_title (recall.py:57-74)
  - If an exception occurs after `conn = sqlite3.connect(db_path)` at line 58 but before either `conn.close()` call, the connection is never closed.
  - The except block at line 73 catches the exception but does not close the connection.
  - Should use `with conn:` context manager or `try/finally: conn.close()`.
  - Relates to: resource management, GP-08 (Graceful Degradation)

  ### S3: LIKE query wildcard escape missing in _find_note_by_title (recall.py:68)
  - User-supplied `title` from `cb_read` identifier input is used in `LIKE '%{title}%'` without escaping `%` and `_` characters.
  - A title containing `%` matches all notes; `_` matches any single character.
  - Not SQL injection (parameterized), but wrong search semantics.
  - Relates to: correctness, retrieval accuracy

  ### S4: C-06 vault write abstraction bypassed (7 locations across 5 files)
  - Same finding as spec-reviewer S1. pipeline.py (4), enrich.py (1), format.py (1), manage.py (1), setup.py (1).
  - Relates to: C-06

  ## Minor Findings

  ### M1: Dead status branch in vault.py:443
  - `status = "active" if durability == "durable" else "active"` — both branches return 'active'.
  - Both cases produce the same value; the else branch is dead code.

  ### M2: TOCTOU race on session dedup
  - `is_session_already_extracted` check-then-write pattern has a theoretical race between two concurrent hook invocations.
  - Low risk: single-user system, hooks fire once per event.
  - Relates to: C-11, C-16

  ### M3: TestMapper PytestCollectionWarning
  - tests/_dependency_map.py:9 — `TestMapper` class has __init__ constructor, causing pytest collection warning.
  - Not a test failure but noisy.

  ## Dynamic Testing Results

  - **Test suite**: 1333 passed, 16 skipped, 4 warnings in 4.27s
  - **Quality gates**: ruff and basedpyright not re-run (pre-commit enforced)
  - **No test failures or errors**
