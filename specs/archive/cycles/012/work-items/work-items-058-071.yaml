items:
  '067':
    title: Update requires-python to >=3.11
    complexity: trivial
    scope:
    - path: pyproject.toml
      op: modify
    - path: specs/steering/constraints.md
      op: modify
    depends: []
    blocks: []
    criteria:
    - pyproject.toml `requires-python` is `">=3.11"`
    - Constraint C1 in constraints.md updated to say Python 3.11+
    - '`uv sync` succeeds'
  068:
    title: Add pre-commit hook for ruff format and lint
    complexity: trivial
    scope:
    - path: .pre-commit-config.yaml
      op: create
    - path: pyproject.toml
      op: modify
    depends: []
    blocks: []
    criteria:
    - .pre-commit-config.yaml exists with ruff format and ruff check hooks
    - pre-commit is in dependency-groups dev
    - '`uv run pre-commit run --all-files` passes (format clean, lint clean)'
  069:
    title: Establish basedpyright clean baseline
    complexity: small
    scope:
    - path: src/**/*.py
      op: modify
    - path: pyproject.toml
      op: modify
    depends:
    - '067'
    blocks: []
    criteria:
    - '`uv run basedpyright src/cyberbrain/` exits with 0 errors in basic mode'
    - 'Any suppression uses inline `# type: ignore[rule]` with specific rule codes,
      not bare `# type: ignore`'
    - "No behavioral changes \u2014 only type annotations and suppressions"
    - '`uv run python3 -m pytest tests/ --ignore=tests/test_dependency_map.py` passes'
  '070':
    title: Narrow broad exception handlers in production code
    complexity: small
    scope:
    - path: src/cyberbrain/**/*.py
      op: modify
    depends: []
    blocks: []
    criteria:
    - 'All `except Exception` in src/cyberbrain/ either: (a) catch a specific exception
      type, or (b) have an inline comment explaining why broad catch is intentional'
    - No bare `except:` (without exception type) exists in src/cyberbrain/
    - "No behavioral changes \u2014 exception handling logic unchanged, only catch\
      \ types narrowed or documented"
    - '`uv run python3 -m pytest tests/ --ignore=tests/test_dependency_map.py` passes'
  '071':
    title: Light-touch sys.modules cleanup in test files
    complexity: medium
    scope:
    - path: tests/test_*.py
      op: modify
    depends: []
    blocks: []
    criteria:
    - Each test file with sys.modules manipulation has a docstring block explaining
      why it is needed and what it controls
    - Any sys.modules.pop loop is consolidated into a helper function (no duplicated
      5-line loops)
    - Any module-level MagicMock setup uses a consistent pattern across all test files
    - No new sys.modules entries added beyond what existed before
    - '`uv run python3 -m pytest tests/ --ignore=tests/test_dependency_map.py` passes
      with same test count (1294)'
