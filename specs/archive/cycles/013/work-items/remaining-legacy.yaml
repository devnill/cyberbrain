items:
  '001':
    title: Evaluation Tooling Framework
    complexity: high
    scope:
    - path: extractors/evaluate.py
      op: create
    - path: mcp/tools/evaluate.py
      op: create
    - path: tests/test_evaluate.py
      op: create
    - path: prompts/evaluate-system.md
      op: create
    depends: []
    blocks:
    - '004'
    - '005'
    criteria:
    - A CLI tool or MCP tool that accepts a vault note (or set of notes) and a curation
      operation, runs the operation with multiple configurations (model, prompt variant,
      parameters), and presents results side-by-side
    - 'Output includes: input notes, each variant''s output, diff between variants,
      and a structured quality assessment'
    - 'Supports at minimum: restructure (merge/split/hub), enrichment (frontmatter
      generation), and extraction (beat quality)'
    - Results are persisted to a reviewable format (markdown or JSON) for longitudinal
      tracking
    - Can be run non-destructively (no vault writes) against real vault data
    - Test coverage for the evaluation framework itself
    notes: plan/notes/001.md
  '002':
    title: Manual Validation Test Plan for Automatic Invocation
    complexity: low
    scope:
    - path: specs/steering/research/automatic-invocation-validation.md
      op: create
    depends: []
    blocks:
    - '006'
    criteria:
    - Test plan document exists at `specs/steering/research/automatic-invocation-validation.md`
    - 'Test plan covers: proactive_recall config flag behavior, cyberbrain://guide
      resource loading, orient prompt invocation, recall prompt invocation, mid-session
      proactive recall triggers'
    - 'Test plan covers each client: Claude Desktop, Claude Code'
    - 'Each test case has: preconditions, steps, expected behavior, actual behavior
      (filled in during execution), pass/fail'
    - Test execution results are recorded with timestamps and client versions
    - Gap analysis section identifies what needs to change for each failed test
    notes: plan/notes/002.md
  '003':
    title: Knowledge Graph + ML Research Investigation
    complexity: medium
    scope:
    - path: specs/steering/research/knowledge-graph-ml-approaches.md
      op: create
    depends: []
    blocks:
    - '005'
    criteria:
    - Research report exists at `specs/steering/research/knowledge-graph-ml-approaches.md`
    - 'Report covers at minimum: graph embedding methods (TransE, RotatE, node2vec),
      GNN approaches (GCN, GraphSAGE), typed-edge traversal strategies, and hybrid
      graph+vector retrieval architectures'
    - 'Each approach is evaluated against: implementation complexity, dependency footprint,
      quality improvement potential at personal vault scale (1K-10K notes), compatibility
      with current SQLite + flat-file architecture'
    - Report includes a comparison of graph database options (Neo4j, Kuzu, SQLite-based,
      in-memory) with tradeoffs for local vs. hosted deployment
    - 'Report addresses the specific question: can typed edges (causes, implements,
      supersedes, etc.) improve retrieval precision beyond what embedding similarity
      provides?'
    - 'Concrete recommendation with rationale: which approach(es) to prototype first,
      and what infrastructure changes they require'
    - Assessment of whether the current `related:` frontmatter and `## Relations`
      body encoding is sufficient substrate for graph-enhanced retrieval, or whether
      a richer representation is needed
    notes: plan/notes/003.md
  '004':
    title: Restructure Pipeline Quality Improvements
    complexity: high
    scope:
    - path: mcp/tools/restructure.py
      op: modify
    - path: extractors/search_backends.py
      op: modify
    - path: prompts/restructure-*.md
