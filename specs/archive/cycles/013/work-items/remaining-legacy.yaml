    - '006'
    - '007'
    criteria:
    - '`cb_recall` with `synthesize=True` produces coherent, accurate synthesis from
      multiple retrieved notes'
    - 'Synthesis is token-efficient: injects only relevant content, not full note
      bodies'
    - Retrieval precision is improved over current baseline (measured via evaluation
      tooling from 001)
    - Knowledge graph research findings (003) are incorporated where they demonstrably
      improve precision
    - The retrieval pipeline produces identical results regardless of which MCP client
      invokes it
