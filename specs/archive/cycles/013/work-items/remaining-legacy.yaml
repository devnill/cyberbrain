    - path: tests/test_restructure_tool.py
      op: modify
    - path: mcp/tools/enrich.py
      op: modify
    - path: mcp/tools/review.py
      op: modify
    - path: extractors/autofile.py
      op: modify
    depends:
    - '001'
    blocks:
    - '007'
    criteria:
    - False grouping rate is measurably reduced (measured via evaluation tooling from
      001)
    - Restructure operations produce acceptable results in a single pass for the common
      case (no mandatory re-runs)
    - Clustering strategies (embedding, llm, hybrid) are evaluated against real vault
      data with documented quality comparisons
    - 'Decision on D10 (decision/generation split) is made with supporting evidence:
      either implemented or explicitly re-deferred with rationale'
    - 'Decision on per-phase model selection is made: which phases benefit from stronger
      models, documented with comparison data'
    - Prompt improvements (if any) are validated against baseline using evaluation
      tooling
    - Existing test suite continues to pass; new tests cover any changed behavior
    - Curation quality improvements extend to autofile, enrichment, and working memory
      review where applicable (not restructure-only)
    notes: plan/notes/004.md
  '005':
